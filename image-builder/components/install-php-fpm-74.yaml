#
# EC2 Image Builder Component: PHP-FPM 7.4 Install
#
# Purpose: Install PHP 7.4 FPM with extensions from Ondrej PPA,
#          logrotate, and boot script.
#
# Canonical source: cloudformation/cf-image-builder.yaml (PhpFpm74InstallComponent)
# This file is a reference copy for documentation purposes.
#
# Dependencies: BaseHardeningComponent
#
# NOTE: PHP 7.4 is EOL (Nov 2022). Requires Ondrej PPA on Ubuntu 24.04.
#

name: PhpFpm74Install
description: PHP 7.4 FPM with extensions
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: DownloadExtensionsList
        action: S3Download
        inputs:
          - source: s3://{{BucketName}}/configs/php/7.4/extensions.txt
            destination: /tmp/php-extensions.txt

      - name: DownloadWwwConf
        action: S3Download
        inputs:
          - source: s3://{{BucketName}}/configs/php/7.4/www.conf
            destination: /tmp/www.conf

      - name: DownloadPhpIni
        action: S3Download
        inputs:
          - source: s3://{{BucketName}}/configs/php/7.4/php.ini
            destination: /tmp/php.ini

      - name: AddOndrejPpa
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Add Ondrej PHP PPA ==="
              export DEBIAN_FRONTEND=noninteractive
              add-apt-repository -y ppa:ondrej/php
              apt-get update -y

      - name: InstallPhpExtensions
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install PHP 7.4 Extensions ==="
              export DEBIAN_FRONTEND=noninteractive
              # Read extensions list, skip comments and blank lines
              PACKAGES=$(grep -v '^#' /tmp/php-extensions.txt | grep -v '^\s*$' | tr '\n' ' ')
              echo "Installing: $PACKAGES"
              # Check availability first
              for pkg in $PACKAGES; do
                if ! apt-cache show "$pkg" >/dev/null 2>&1; then
                  echo "WARNING: Package $pkg not available, skipping"
                  PACKAGES=$(echo "$PACKAGES" | sed "s/$pkg//")
                fi
              done
              apt-get install -y $PACKAGES

      - name: CreatePoolDir
        action: CreateFolder
        inputs:
          - path: /etc/php/7.4/fpm/pool.d
            owner: root
            group: root
            permissions: 0755
            overwrite: false

      - name: InstallWwwConf
        action: CopyFile
        inputs:
          - source: /tmp/www.conf
            destination: /etc/php/7.4/fpm/pool.d/www.conf

      - name: InstallPhpIni
        action: CopyFile
        inputs:
          - source: /tmp/php.ini
            destination: /etc/php/7.4/fpm/php.ini

      - name: SetPhpConfigPermissions
        action: SetFilePermissions
        inputs:
          - path: /etc/php/7.4/fpm/pool.d/www.conf
            permissions: 0644
          - path: /etc/php/7.4/fpm/php.ini
            permissions: 0644

      - name: ConfigureLogrotate
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Configure PHP-FPM Logrotate ==="
              cat > /etc/logrotate.d/php7.4-fpm <<'LREOF'
              /var/log/php7.4-fpm*.log {
                daily
                missingok
                rotate 14
                compress
                delaycompress
                notifempty
                create 0640 www-data adm
                postrotate
                  [ -f /run/php/php7.4-fpm.pid ] && kill -USR1 $(cat /run/php/php7.4-fpm.pid)
                endscript
              }
              LREOF

      - name: InstallPostfix
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install Postfix (satellite relay for outbound email) ==="
              export DEBIAN_FRONTEND=noninteractive
              # Pre-seed debconf to avoid interactive prompts
              debconf-set-selections <<< "postfix postfix/mailname string localhost"
              debconf-set-selections <<< "postfix postfix/main_mailer_type string 'Satellite system'"
              apt-get install -y postfix libsasl2-modules
              # Configure as satellite relay (no local delivery)
              postconf -e "inet_interfaces = loopback-only"
              postconf -e "mydestination = "
              postconf -e "smtp_use_tls = yes"
              postconf -e "smtp_tls_security_level = encrypt"
              postconf -e "smtp_tls_note_starttls_offer = yes"
              postconf -e "smtp_sasl_auth_enable = yes"
              postconf -e "smtp_sasl_security_options = noanonymous"
              postconf -e "smtp_sasl_password_maps = hash:/etc/postfix/sasl_passwd"
              # Relayhost will be configured at boot from SSM/Secrets Manager
              systemctl enable postfix
              systemctl stop postfix

      - name: InstallHealthCheckNginx
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install Health Check NGINX (micro instance for NLB HTTP health checks) ==="
              export DEBIAN_FRONTEND=noninteractive
              apt-get install -y nginx-light
              # Remove default site
              rm -f /etc/nginx/sites-enabled/default
              # Write health check server config
              cat > /etc/nginx/conf.d/health-check.conf <<'HCEOF'
              # Health check endpoint for NLB (port 9100)
              # Proxies /health to PHP-FPM via FastCGI to verify worker availability
              server {
                listen 9100;
                server_name _;
                access_log off;

                location /health {
                  include fastcgi_params;
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_param SCRIPT_FILENAME /var/www/health.php;
                  fastcgi_param SCRIPT_NAME /health.php;
                  fastcgi_read_timeout 5s;
                }

                location / {
                  return 404;
                }
              }
              HCEOF
              # Write health check PHP script
              mkdir -p /var/www
              cat > /var/www/health.php <<'PHPEOF'
              <?php
              // SPDX-License-Identifier: GPL-2.0-or-later
              // Copyright (C) 2026 The Worx Company
              // Purpose: PHP-FPM health check endpoint for NLB
              http_response_code(200);
              header('Content-Type: text/plain');
              echo 'OK';
              PHPEOF
              chmod 644 /var/www/health.php
              chown www-data:www-data /var/www/health.php
              # Enable but stop (starts at boot via configure-php.sh)
              systemctl enable nginx
              systemctl stop nginx

      - name: CreateBootScript
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Create Boot Configuration Script ==="
              mkdir -p /opt/worxco
              cat > /opt/worxco/configure-php.sh <<'BOOTEOF'
              #!/bin/bash
              # SPDX-License-Identifier: GPL-2.0-or-later
              # Copyright (C) 2026 The Worx Company
              #
              # Purpose: Configure PHP-FPM at boot time
              # - Mount /var/www from FSx
              # - Configure Valkey session handler from SSM
              # - Configure database connection from SSM
              # - Start PHP-FPM
              #
              set -euo pipefail
              PHP_VER="7.4"
              IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
              REGION=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
              ENV=$(aws ssm get-parameter --name "/environment/name" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "sandbox")

              echo "[configure-php] Starting PHP $PHP_VER configuration for $ENV"

              # Mount FSx webroot
              FSX_DNS=$(aws ssm get-parameter --name "/$ENV/fsx/dns-name" --region "$REGION" \
                --query 'Parameter.Value' --output text)
              if [ -n "$FSX_DNS" ] && [ "$FSX_DNS" != "None" ]; then
                echo "[configure-php] Mounting /var/www from $FSX_DNS"
                mount -t nfs4 -o vers=4.1,port=2049 \
                  "$FSX_DNS:/fsx" /var/www || echo "[configure-php] WARNING: Failed to mount /var/www"
              fi

              # ============================================================
              # pool.d/extra/ drop-in dir — included from [www] in www.conf
              # ============================================================
              # Both cache-session.conf and drupal-env.conf land here.
              # 0640 root:www-data because they hold the cache AUTH token
              # and the Drupal DB password (php.ini is world-readable).
              # ============================================================
              POOL_EXTRA="/etc/php/$PHP_VER/fpm/pool.d/extra"
              mkdir -p "$POOL_EXTRA"

              # ============================================================
              # Valkey session handler (TLS + AUTH)
              # ============================================================
              # cf-cache provisions ElastiCache Valkey with TransitEncryption
              # and an AuthToken, so plain tcp:6379 fails. Connect via TLS on
              # the cluster's primary port (typically 6380) with auth=… in
              # the save_path query string. Auth token is alphanumeric
              # (cf-cache ExcludePunctuation: true) — no URL encoding needed.
              # ============================================================
              CACHE_ENDPOINT=$(aws ssm get-parameter --name "/$ENV/cache/endpoint" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "")
              CACHE_PORT=$(aws ssm get-parameter --name "/$ENV/cache/port" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "6380")
              CACHE_AUTH_RAW=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/$ENV/cache/auth-token" --region "$REGION" \
                --query 'SecretString' --output text 2>/dev/null || echo "")
              CACHE_AUTH=$(echo "$CACHE_AUTH_RAW" | jq -r '.password // empty' 2>/dev/null || true)
              [ -z "$CACHE_AUTH" ] && CACHE_AUTH="$CACHE_AUTH_RAW"
              unset CACHE_AUTH_RAW
              if [ -n "$CACHE_ENDPOINT" ] && [ "$CACHE_ENDPOINT" != "None" ] && [ -n "$CACHE_AUTH" ]; then
                echo "[configure-php] Writing Valkey TLS session config: $CACHE_ENDPOINT:$CACHE_PORT"
                {
                  echo "; Valkey session handler - generated by /opt/worxco/configure-php.sh at boot."
                  echo "; phpredis ext speaks TLS via tls:// scheme; AUTH passed via query string."
                  echo "; DO NOT EDIT - regenerated on every boot."
                  echo 'php_value[session.save_handler] = redis'
                  printf 'php_value[session.save_path]    = "tls://%s:%s?auth=%s&persistent=1"\n' \
                    "$CACHE_ENDPOINT" "$CACHE_PORT" "$CACHE_AUTH"
                } > "$POOL_EXTRA/cache-session.conf"
                chmod 640 "$POOL_EXTRA/cache-session.conf"
                chown root:www-data "$POOL_EXTRA/cache-session.conf"
              elif [ -n "$CACHE_ENDPOINT" ] && [ "$CACHE_ENDPOINT" != "None" ]; then
                echo "[configure-php] WARNING: cache endpoint set but auth token missing - sessions will use default (files)"
              fi

              # ============================================================
              # Drupal env vars -> PHP-FPM pool (read by settings.php getenv)
              # ============================================================
              # Sourced from SSM (/<env>/rds/*, /<env>/drupal/*) and Secrets
              # Manager (worxco/<env>/drupal/db-password). Written into the
              # pool.d/extra/ drop-in so [www] inherits via include= in
              # pool.d/www.conf. Idempotent — rewritten on every boot.
              # ============================================================
              DRUPAL_DB_HOST=$(aws ssm get-parameter --name "/$ENV/rds/endpoint" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "")
              DRUPAL_DB_PORT=$(aws ssm get-parameter --name "/$ENV/rds/port" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "5432")
              DRUPAL_DB_NAME=$(aws ssm get-parameter --name "/$ENV/drupal/db-name" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "drupal")
              DRUPAL_DB_USER=$(aws ssm get-parameter --name "/$ENV/drupal/db-user" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "drupal_user")
              DRUPAL_SITE_NAME=$(aws ssm get-parameter --name "/$ENV/drupal/site-name" --region "$REGION" \
                --query 'Parameter.Value' --output text 2>/dev/null || echo "")
              DRUPAL_DB_RAW=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/$ENV/drupal/db-password" --region "$REGION" \
                --query 'SecretString' --output text 2>/dev/null || echo "")
              DRUPAL_DB_PASS=$(echo "$DRUPAL_DB_RAW" | jq -r '.password // empty' 2>/dev/null || true)
              [ -z "$DRUPAL_DB_PASS" ] && DRUPAL_DB_PASS="$DRUPAL_DB_RAW"
              unset DRUPAL_DB_RAW
              if [ -n "$DRUPAL_DB_HOST" ] && [ "$DRUPAL_DB_HOST" != "None" ]; then
                echo "[configure-php] Writing Drupal env vars to $POOL_EXTRA/drupal-env.conf"
                # printf %s — DB password may contain $ or backticks (cf-app-drupal
                # ExcludeCharacters drops quotes/@//#%&+:;=?[] but NOT $/backtick).
                {
                  echo "; Drupal env vars - generated by /opt/worxco/configure-php.sh at boot."
                  echo "; Sourced from SSM (/$ENV/drupal/*, /$ENV/rds/*) and Secrets Manager."
                  echo "; [www] pool inherits via include= in pool.d/www.conf."
                  echo "; DO NOT EDIT - regenerated on every boot."
                  printf 'env[ENVIRONMENT_NAME] = %s\n' "$ENV"
                  printf 'env[DRUPAL_DB_HOST]   = %s\n' "$DRUPAL_DB_HOST"
                  printf 'env[DRUPAL_DB_PORT]   = %s\n' "$DRUPAL_DB_PORT"
                  printf 'env[DRUPAL_DB_NAME]   = %s\n' "$DRUPAL_DB_NAME"
                  printf 'env[DRUPAL_DB_USER]   = %s\n' "$DRUPAL_DB_USER"
                  printf 'env[DRUPAL_DB_PASS]   = %s\n' "$DRUPAL_DB_PASS"
                  printf 'env[DRUPAL_SITE_NAME] = %s\n' "$DRUPAL_SITE_NAME"
                } > "$POOL_EXTRA/drupal-env.conf"
                # 0640 root:www-data — DB password is sensitive; PHP-FPM master
                # runs as root and reads pool config at startup, workers inherit
                # env vars without needing read access to this file.
                chmod 640 "$POOL_EXTRA/drupal-env.conf"
                chown root:www-data "$POOL_EXTRA/drupal-env.conf"
              else
                echo "[configure-php] WARNING: /$ENV/rds/endpoint not found - Drupal env vars NOT configured"
              fi

              # Configure Postfix SES relay (if credentials available)
              SES_CREDS=$(aws secretsmanager get-secret-value \
                --secret-id "/$ENV/ses/smtp-credentials" --region "$REGION" \
                --query 'SecretString' --output text 2>/dev/null || echo "")
              if [ -n "$SES_CREDS" ] && [ "$SES_CREDS" != "" ]; then
                SES_USER=$(echo "$SES_CREDS" | jq -r '.username // empty')
                SES_PASS=$(echo "$SES_CREDS" | jq -r '.password // empty')
                SES_HOST="email-smtp.$REGION.amazonaws.com"
                if [ -n "$SES_USER" ] && [ -n "$SES_PASS" ]; then
                  echo "[configure-php] Configuring Postfix SES relay via $SES_HOST"
                  postconf -e "relayhost = [$SES_HOST]:587"
                  echo "[$SES_HOST]:587 $SES_USER:$SES_PASS" > /etc/postfix/sasl_passwd
                  chmod 600 /etc/postfix/sasl_passwd
                  postmap /etc/postfix/sasl_passwd
                fi
              else
                echo "[configure-php] WARNING: SES credentials not found, Postfix will queue mail locally"
              fi
              systemctl restart postfix

              # Start PHP-FPM
              systemctl start php$PHP_VER-fpm
              echo "[configure-php] PHP-FPM $PHP_VER started successfully"
              # Start health check NGINX (after PHP-FPM is running)
              systemctl start nginx
              echo "[configure-php] Health check NGINX started on port 9100"
              BOOTEOF
              chmod 755 /opt/worxco/configure-php.sh

      - name: FstabTemplate
        action: AppendFile
        inputs:
          - path: /etc/fstab
            content: |
              # FSx NFS mount (activated at boot by configure-php.sh)
              # {fsx_dns}:/fsx /var/www nfs4 vers=4.1,port=2049,_netdev,nofail 0 0

#
# EC2 Image Builder Component: PHP-FPM 7.4 Install
#
# Purpose: Install PHP 7.4 FPM with extensions from Ondrej PPA,
#          logrotate, and boot script.
#
# Canonical source: cloudformation/cf-image-builder.yaml (PhpFpm74InstallComponent)
# This file is a reference copy for documentation purposes.
#
# Dependencies: BaseHardeningComponent
#
# NOTE: PHP 7.4 is EOL (Nov 2022). Requires Ondrej PPA on Ubuntu 24.04.
#

name: PhpFpm74Install
description: PHP 7.4 FPM with extensions
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: DownloadExtensionsList
        action: S3Download
        inputs:
          - source: s3://{{BucketName}}/configs/php/7.4/extensions.txt
            destination: /tmp/php-extensions.txt

      - name: DownloadWwwConf
        action: S3Download
        inputs:
          - source: s3://{{BucketName}}/configs/php/7.4/www.conf
            destination: /tmp/www.conf

      - name: DownloadPhpIni
        action: S3Download
        inputs:
          - source: s3://{{BucketName}}/configs/php/7.4/php.ini
            destination: /tmp/php.ini

      - name: AddOndrejPpa
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Add Ondrej PHP PPA ==="
              export DEBIAN_FRONTEND=noninteractive
              add-apt-repository -y ppa:ondrej/php
              apt-get update -y

      - name: InstallPhpExtensions
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install PHP 7.4 Extensions ==="
              export DEBIAN_FRONTEND=noninteractive
              # Read extensions list, skip comments and blank lines
              PACKAGES=$(grep -v '^#' /tmp/php-extensions.txt | grep -v '^\s*$' | tr '\n' ' ')
              echo "Installing: $PACKAGES"
              # Check availability first
              for pkg in $PACKAGES; do
                if ! apt-cache show "$pkg" >/dev/null 2>&1; then
                  echo "WARNING: Package $pkg not available, skipping"
                  PACKAGES=$(echo "$PACKAGES" | sed "s/$pkg//")
                fi
              done
              apt-get install -y $PACKAGES

      - name: CreatePoolDir
        action: CreateFolder
        inputs:
          - path: /etc/php/7.4/fpm/pool.d
            owner: root
            group: root
            permissions: 0755
            overwrite: false

      - name: InstallWwwConf
        action: CopyFile
        inputs:
          - source: /tmp/www.conf
            destination: /etc/php/7.4/fpm/pool.d/www.conf

      - name: InstallPhpIni
        action: CopyFile
        inputs:
          - source: /tmp/php.ini
            destination: /etc/php/7.4/fpm/php.ini

      - name: SetPhpConfigPermissions
        action: SetFilePermissions
        inputs:
          - path: /etc/php/7.4/fpm/pool.d/www.conf
            permissions: 0644
          - path: /etc/php/7.4/fpm/php.ini
            permissions: 0644

      - name: ConfigureLogrotate
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Configure PHP-FPM Logrotate ==="
              cat > /etc/logrotate.d/php7.4-fpm <<'LREOF'
              /var/log/php7.4-fpm*.log {
                daily
                missingok
                rotate 14
                compress
                delaycompress
                notifempty
                create 0640 www-data adm
                postrotate
                  [ -f /run/php/php7.4-fpm.pid ] && kill -USR1 $(cat /run/php/php7.4-fpm.pid)
                endscript
              }
              LREOF

      - name: InstallPostfix
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install Postfix (satellite relay for outbound email) ==="
              export DEBIAN_FRONTEND=noninteractive
              # Pre-seed debconf to avoid interactive prompts
              debconf-set-selections <<< "postfix postfix/mailname string localhost"
              debconf-set-selections <<< "postfix postfix/main_mailer_type string 'Satellite system'"
              apt-get install -y postfix libsasl2-modules
              # Configure as satellite relay (no local delivery)
              postconf -e "inet_interfaces = loopback-only"
              postconf -e "mydestination = "
              postconf -e "smtp_use_tls = yes"
              postconf -e "smtp_tls_security_level = encrypt"
              postconf -e "smtp_tls_note_starttls_offer = yes"
              postconf -e "smtp_sasl_auth_enable = yes"
              postconf -e "smtp_sasl_security_options = noanonymous"
              postconf -e "smtp_sasl_password_maps = hash:/etc/postfix/sasl_passwd"
              # Relayhost will be configured at boot from SSM/Secrets Manager
              systemctl enable postfix
              systemctl stop postfix

      - name: InstallHealthCheckNginx
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install Health Check NGINX (micro instance for NLB HTTP health checks) ==="
              export DEBIAN_FRONTEND=noninteractive
              apt-get install -y nginx-light
              # Remove default site
              rm -f /etc/nginx/sites-enabled/default
              # Write health check server config
              cat > /etc/nginx/conf.d/health-check.conf <<'HCEOF'
              # Health check endpoint for NLB (port 9100)
              # Proxies /health to PHP-FPM via FastCGI to verify worker availability
              server {
                listen 9100;
                server_name _;
                access_log off;

                location /health {
                  include fastcgi_params;
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_param SCRIPT_FILENAME /var/www/health.php;
                  fastcgi_param SCRIPT_NAME /health.php;
                  fastcgi_read_timeout 5s;
                }

                location / {
                  return 404;
                }
              }
              HCEOF
              # Write health check PHP script
              mkdir -p /var/www
              cat > /var/www/health.php <<'PHPEOF'
              <?php
              // SPDX-License-Identifier: GPL-2.0-or-later
              // Copyright (C) 2026 The Worx Company
              // Purpose: PHP-FPM health check endpoint for NLB
              http_response_code(200);
              header('Content-Type: text/plain');
              echo 'OK';
              PHPEOF
              chmod 644 /var/www/health.php
              chown www-data:www-data /var/www/health.php
              # Enable but stop (starts at boot via configure-php.sh)
              systemctl enable nginx
              systemctl stop nginx

      - name: CreateBootScript
        action: ExecuteBash
        inputs:
          commands:
            - |
              set -euo pipefail
              echo "=== Install configure-php.sh from S3 ==="
              mkdir -p /opt/worxco
              # PHP version baked into this AMI - read at runtime by the
              # shared configure-php.sh (one script, both AMIs).
              echo "7.4" > /opt/worxco/php-version
              aws s3 cp "s3://{{BucketName}}/configs/configure-php.sh" /opt/worxco/configure-php.sh
              chmod 755 /opt/worxco/configure-php.sh
      - name: FstabTemplate
        action: AppendFile
        inputs:
          - path: /etc/fstab
            content: |
              # FSx NFS mount (activated at boot by configure-php.sh)
              # {fsx_dns}:/fsx /var/www nfs4 vers=4.1,port=2049,_netdev,nofail 0 0

#
# NGINX base configuration for reverse proxy AMIs
# Pulled from S3 during Image Builder build
# Runtime config (upstreams, vhosts) loaded from /etc/nginx/shared/ via NFS
#

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  # Basic settings
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  client_max_body_size 64m;

  # MIME types
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  '$request_time $upstream_response_time';
  access_log /var/log/nginx/access.log main;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             image/svg+xml;

  # Security headers (defaults, can be overridden per-vhost)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

  # Upstream PHP-FPM definitions (generated at boot by configure-nginx.sh)
  include /etc/nginx/conf.d/*.conf;

  # Default server — answers any request that doesn't match a configured
  # `server_name` in the shared vhost set below. This MUST own port 80's
  # default_server flag because:
  #
  #   1. ALB target-group health checks hit /health with no Host header
  #      (or with the ALB's amazonaws.com DNS as Host). Without a default
  #      server here, those requests have nowhere to land — nginx returns
  #      empty replies and the ELB marks instances unhealthy, triggering
  #      ASG churn. Putting /health in a real vhost (drupal.conf) coupled
  #      compute health to Drupal install state; this block breaks that
  #      coupling so nginx is self-sufficient from second one of boot.
  #
  #   2. Real-traffic vhosts (drupal.conf, etc.) below MUST NOT also
  #      declare `default_server` — two default_server blocks on the
  #      same listen port is an nginx config error. They route by
  #      server_name instead.
  #
  # Per-env nginx vhosts loaded from FSx (see next include) match by
  # server_name (e.g. `sandbox.envs.zoning-info.com`). Anything else
  # — including ALB health probes — falls through to this default.
  server {
    listen 80 default_server;
    server_name _;

    access_log off;
    error_log /var/log/nginx/default_server_error.log warn;

    # Always-200 health endpoint — no PHP dependency, no FSx dependency.
    location = /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Everything else gets 404. (Not 503: a real client hitting an
    # un-configured hostname should see "not found", not "service down".)
    location / {
      return 404 "no vhost configured for this host\n";
      add_header Content-Type text/plain;
    }
  }

  # Shared vhost configs from NFS mount (managed centrally — drupal.conf,
  # future site vhosts, etc.). These match by `server_name`; if none
  # match, the default_server above answers.
  include /etc/nginx/shared/sites-enabled/*.conf;
}

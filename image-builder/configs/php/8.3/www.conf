; PHP 8.3 FPM pool configuration
; Installed to /etc/php/8.3/fpm/pool.d/www.conf during AMI build
;

[www]
user = www-data
group = www-data

; Listen on all interfaces, port 9000
; NGINX connects via NLB to PHP-FPM instances
listen = 0.0.0.0:9000
; listen.allowed_clients accepts a comma-separated IP allow-list, NOT the
; string "any". Setting it to "any" makes PHP-FPM reject EVERY connection
; with "ERROR: Connection disallowed: IP". Leave the directive unset (the
; default is to allow any IP). Network-level access control is enforced by
; the PHP security group, which only allows the nginx SG on port 9000.
; Discovered 2026-05-15 after a multi-day debug of "premature close" 502s.

; Process manager: dynamic scaling
pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Status and ping for health checks
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Logging
php_admin_value[error_log] = /var/log/php8.3-fpm.log
php_admin_flag[log_errors] = on
slowlog = /var/log/php8.3-fpm-slow.log
request_slowlog_timeout = 5s

; Timeouts
request_terminate_timeout = 120s

; Environment variables (cleared for security, set explicitly)
clear_env = yes

; Boot-time env vars (Drupal DB/cache/site config) are appended below
; this line by /opt/worxco/configure-php.sh between BEGIN/END markers.
; PHP-FPM does NOT support `include=` inside a pool section — only at
; the global level — so we mutate this file in place at boot instead.

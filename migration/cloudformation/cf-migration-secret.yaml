#
# CloudFormation Template: Migration Prod-DB Secret
#
# Purpose: One AWS Secrets Manager secret in the PROD account, holding
#          the connection details for the prod MySQL (Aurora) database
#          the migration jumpbox needs to mysqldump from. Keeps the
#          real password out of Git and out of the CFN template.
#
#          The secret is created with a placeholder value; the real
#          password is injected via:
#             make set-migration-secret-password
#          which calls `aws secretsmanager put-secret-value` with the
#          operator-supplied password (read from stdin with -s).
#
#          The jumpbox stack references this secret's ARN in its IAM
#          role so `secretsmanager:GetSecretValue` is scoped to only
#          this secret.
#
# Deploy:  make deploy-migration-secret          [FROM: Mac|deploy-host, PROFILE: ZoningInfoAdmin]
# Set pw:  make set-migration-secret-password    [FROM: Mac|deploy-host, PROFILE: ZoningInfoAdmin]
# Destroy: make destroy-migration-secret         [FROM: Mac|deploy-host, PROFILE: ZoningInfoAdmin]
#
# Format of the SecretString:
#   {
#     "host":     "<Aurora writer endpoint>",
#     "port":     "3306",
#     "database": "zinew",
#     "username": "worxco",
#     "password": "<populated post-deploy>"
#   }
#
# Scripts on the jumpbox retrieve it with:
#   aws secretsmanager get-secret-value --secret-id cf-migration/prod-mysql-zinew \
#     --query SecretString --output text | jq -r .password
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Migration secret - prod MySQL connection details for zinew (PROD account)'

Parameters:
  SecretName:
    Type: String
    Description: Secrets Manager path for the prod-DB secret
    Default: cf-migration/prod-mysql-zinew
    AllowedPattern: '^[a-zA-Z0-9/_+=.@-]{1,512}$'

  SourceDbHost:
    Type: String
    Description: Aurora writer endpoint hosting the source database
    Default: d8demo-cluster.cluster-cmbywichztfj.us-east-1.rds.amazonaws.com

  SourceDbPort:
    Type: String
    Description: TCP port for the source database
    Default: '3306'
    AllowedPattern: '^[0-9]{1,5}$'

  SourceDbName:
    Type: String
    Description: Name of the source database (schema) to dump
    Default: zinew
    AllowedPattern: '^[a-zA-Z0-9_-]{1,64}$'

  SourceDbUser:
    Type: String
    Description: MySQL user with SELECT privileges on the source database
    Default: worxco
    AllowedPattern: '^[a-zA-Z0-9_-]{1,32}$'

Resources:
  # ========================================
  # The secret itself
  # ========================================
  # Initial value is a placeholder for the password field. The
  # operator MUST run `make set-migration-secret-password` before
  # any migration script tries to consume this secret; scripts
  # should validate that the retrieved password does not start
  # with "PLACEHOLDER-" and fail loud if it does.
  MigrationSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: >-
        Prod MySQL credentials for pgloader migration. Password value
        must be populated after stack creation via
        `aws secretsmanager put-secret-value --secret-id <name>` or
        `make set-migration-secret-password`.
      SecretString: !Sub |
        {
          "host":     "${SourceDbHost}",
          "port":     "${SourceDbPort}",
          "database": "${SourceDbName}",
          "username": "${SourceDbUser}",
          "password": "PLACEHOLDER-SET-VIA-CLI-AFTER-DEPLOY"
        }
      Tags:
        - Key: Name
          Value: !Ref SecretName
        - Key: Purpose
          Value: Cross-account Drupal migration - temporary
        - Key: Environment
          Value: production
        - Key: ManagedBy
          Value: cloudformation

Outputs:
  MigrationSecretArn:
    Description: ARN of the prod-DB secret (pass to jumpbox template as MigrationSecretArn)
    Value: !Ref MigrationSecret
    Export:
      Name: cf-migration-prod-mysql-secret-arn

  MigrationSecretName:
    Description: Secret name (use with `aws secretsmanager get-secret-value --secret-id <name>`)
    Value: !Ref SecretName
    Export:
      Name: cf-migration-prod-mysql-secret-name

  PostDeployReminder:
    Description: One-line reminder to set the real password
    Value: 'IMPORTANT - password is placeholder; run: make set-migration-secret-password'


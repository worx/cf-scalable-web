#
# CloudFormation Template: Deploy Host
#
# Purpose: Creates a standalone deploy host in the default VPC for
#          managing cf-scalable-web infrastructure deployments.
#
# Features:
#   - Uses default VPC (survives project VPC teardowns)
#   - Ubuntu 24.04 LTS on ARM (t4g.micro, 1GB RAM + 2GB swap)
#   - SSH access restricted to specified CIDR
#   - SSM Session Manager for primary access
#   - Dynamic public IP (no EIP cost when stopped)
#   - Optional key pair creation (stored in SSM Parameter Store)
#   - Pre-installed: AWS CLI, git, make, screen, tmux, vim, Claude Code
#
# Dependencies: None (standalone)
#
# Usage:
#   make deploy-deploy-host
#   make verify-deploy-host
#   make destroy-deploy-host
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Standalone deploy host for cf-scalable-web infrastructure management'

Parameters:
  KeyPairName:
    Type: String
    Description: Existing EC2 key pair name (leave empty to create new)
    Default: ''

  AllowedSSHCidr:
    Type: String
    Description: CIDR block allowed to SSH (e.g., 203.0.113.50/32 for single IP)
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR block (e.g., 192.168.1.0/24)

  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t4g.micro
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Ubuntu 24.04 LTS ARM64 AMI (resolved from SSM)
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

Conditions:
  CreateKeyPair: !Equals [!Ref KeyPairName, '']

Resources:
  # ========================================
  # Key Pair (Conditional)
  # ========================================

  DeployHostKeyPair:
    Type: AWS::EC2::KeyPair
    Condition: CreateKeyPair
    Properties:
      KeyName: !Sub '${AWS::StackName}-keypair'
      KeyType: ed25519
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-keypair'
        - Key: Purpose
          Value: Deploy host SSH access

  # ========================================
  # Security Group
  # ========================================

  DeployHostSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg'
      GroupDescription: Security group for deploy host - SSH from allowed CIDR only
      # Uses default VPC automatically
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
          Description: SSH from allowed CIDR
      # Default egress allows all outbound (needed for package installs, AWS API calls)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  # ========================================
  # IAM Role (Admin + SSM)
  # ========================================

  DeployHostRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager access
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # Full infrastructure management (PowerUserAccess excludes IAM
        # operations, but this deploy host must create IAM roles/policies
        # for the compute and storage stacks it deploys)
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-role'

  DeployHostInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-profile'
      Roles:
        - !Ref DeployHostRole

  # ========================================
  # EC2 Instance
  # ========================================

  DeployHostInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: !Ref InstanceType
      KeyName: !If
        - CreateKeyPair
        - !Ref DeployHostKeyPair
        - !Ref KeyPairName
      IamInstanceProfile: !Ref DeployHostInstanceProfile
      SecurityGroupIds:
        - !Ref DeployHostSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/deploy-host-bootstrap.log) 2>&1

          echo "=== Deploy Host Bootstrap Starting $(date) ==="

          # Create 2GB swap (supplements t4g.micro's 1GB RAM)
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
          sysctl vm.swappiness=10
          echo 'vm.swappiness=10' >> /etc/sysctl.conf
          echo "Swap enabled: $(swapon --show) (swappiness=10)"

          # System updates
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y

          # Upgrade is best-effort: transient mirror 404s on fresh AMIs are common
          apt-get upgrade -y || apt-get upgrade -y --fix-missing || {
            echo "WARNING: apt-get upgrade failed (non-fatal, continuing)"
          }

          # Core tools
          apt-get install -y \
            git \
            make \
            jq \
            screen \
            tmux \
            tree \
            vim \
            unzip \
            python3-pip \
            python3-venv

          # Make vim the default editor (not nano!)
          update-alternatives --set editor /usr/bin/vim.basic
          cat > /etc/profile.d/deploy-host-env.sh << 'ENVEOF'
          export EDITOR=vim
          export VISUAL=vim
          export AWS_PAGER=""
          export AWS_CLI_AUTO_PROMPT=off
          ENVEOF

          # Set vim as default for git
          su - ubuntu -c 'git config --global core.editor vim'

          # AWS CLI v2 (ARM64)
          cd /tmp
          curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install
          rm -rf aws awscliv2.zip

          # Root password from Secrets Manager (optional, non-fatal)
          echo "=== Setting root password from Secrets Manager ==="
          ROOT_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "worxco/deploy-host/root-password" \
            --region us-east-1 \
            --query 'SecretString' \
            --output text 2>/dev/null) || true
          if [ -n "$ROOT_PASS" ]; then
            echo "root:$ROOT_PASS" | chpasswd
            echo "Root password set from Secrets Manager"
            unset ROOT_PASS
          else
            echo "WARNING: worxco/deploy-host/root-password not found in Secrets Manager - skipping"
          fi

          # cfn-lint for template validation (venv avoids system package conflicts
          # and keeps memory usage low on t4g.nano's 512MB)
          python3 -m venv /opt/cfn-lint --system-site-packages
          /opt/cfn-lint/bin/pip install cfn-lint
          ln -sf /opt/cfn-lint/bin/cfn-lint /usr/local/bin/cfn-lint

          # Node.js 20.x LTS (for Claude Code)
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

          # Claude Code CLI
          npm install -g @anthropic-ai/claude-code

          # Ensure SSM Agent is running (usually pre-installed)
          snap install amazon-ssm-agent --classic || true
          systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service || true
          systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true

          # Create working directory
          mkdir -p /home/ubuntu/projects
          chown ubuntu:ubuntu /home/ubuntu/projects

          # Create helpful motd
          cat > /etc/update-motd.d/99-deploy-host << 'MOTDEOF'
          #!/bin/bash
          echo ""
          echo "============================================"
          echo "  cf-scalable-web Deploy Host"
          echo "============================================"
          echo ""
          echo "Quick Start:"
          echo "  cd ~/projects"
          echo "  git clone <your-repo>"
          echo "  cd cf-scalable-web"
          echo "  cp .env.example .env        # <-- required before make"
          echo "  tmux new -s deploy"
          echo "  make deploy-all ENV=sandbox"
          echo "  # Ctrl-B D to detach"
          echo ""
          echo "AWS: Instance role provides credentials (no ~/.aws/ needed)"
          echo "Installed: aws, git, make, screen, tmux, vim, claude"
          echo ""
          MOTDEOF
          chmod +x /etc/update-motd.d/99-deploy-host

          echo "=== Deploy Host Bootstrap Complete $(date) ==="
          echo "SUCCESS" > /var/log/deploy-host-bootstrap-status

      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}'
        - Key: Purpose
          Value: Infrastructure management deploy host

Outputs:
  DeployHostPublicIP:
    Description: Deploy host public IP (dynamic, changes on stop/start)
    Value: !GetAtt DeployHostInstance.PublicIp

  DeployHostInstanceId:
    Description: Deploy host EC2 instance ID
    Value: !Ref DeployHostInstance
    Export:
      Name: !Sub '${AWS::StackName}-instance-id'

  SSHCommand:
    Description: SSH command to connect (IP changes on stop/start)
    Value: !Sub 'ssh -i ~/.ssh/deploy-host.pem ubuntu@${DeployHostInstance.PublicIp}'

  SSMCommand:
    Description: SSM Session Manager command (no SSH key needed)
    Value: !Sub 'aws ssm start-session --target ${DeployHostInstance}'

  KeyPairParameterPath:
    Condition: CreateKeyPair
    Description: SSM parameter path containing private key (retrieve once, then delete)
    Value: !Sub '/ec2/keypair/${DeployHostKeyPair.KeyPairId}'

  RetrieveKeyCommand:
    Condition: CreateKeyPair
    Description: Command to retrieve private key
    Value: !Sub |
      aws ssm get-parameter --name /ec2/keypair/${DeployHostKeyPair.KeyPairId} --with-decryption --query 'Parameter.Value' --output text > ~/.ssh/deploy-host.pem && chmod 600 ~/.ssh/deploy-host.pem

  SecurityGroupId:
    Description: Deploy host security group ID (for VPC peering rules)
    Value: !Ref DeployHostSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-sg-id'


#
# CloudFormation Template: Deploy Host
#
# Purpose: Creates a standalone deploy host in the default VPC for
#          managing cf-scalable-web infrastructure deployments.
#
# Features:
#   - Uses default VPC (survives project VPC teardowns)
#   - Ubuntu 24.04 LTS on ARM (t4g.small, 2GB RAM + 2GB swap)
#   - SSM Session Manager access only (no SSH inbound)
#   - Public IP for outbound internet (apt-get, git, AWS APIs)
#   - No inbound ports open (security group blocks all ingress)
#   - IAM instance role provides AdministratorAccess (no keys needed)
#   - Pre-installed: AWS CLI, git, make, screen, tmux, vim, Claude Code
#
# Dependencies: None (standalone)
#
# Usage:
#   make deploy-deploy-host
#   make verify-deploy-host
#   make destroy-deploy-host
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Standalone deploy host for cf-scalable-web infrastructure management'

Parameters:
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t4g.small
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small
      - t4g.medium

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Ubuntu 24.04 LTS ARM64 AMI (resolved from SSM)
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

  DeployHostBackupsBucketName:
    Type: String
    Description: >-
      Bucket name for deploy-host state backups (SSH keys, .env,
      .aws/config). Used by UserData auto-restore and by the nightly
      EventBridge Scheduler. Must match the DeployHostBackupsBucketName
      output of the cf-deploy-host-backups stack.
    AllowedPattern: '^[a-z0-9.-]+$'
    Default: 'sandbox-deploy-host-backups-kv-worxco'

Resources:
  # ========================================
  # Security Group (no inbound, SSM only)
  # ========================================

  DeployHostSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg'
      GroupDescription: Security group for deploy host - no inbound, SSM access only
      # Uses default VPC automatically
      # No SecurityGroupIngress — all inbound blocked
      # Default egress allows all outbound (needed for package installs, AWS API calls)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  # ========================================
  # IAM Role (Admin + SSM)
  # ========================================

  DeployHostRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager access
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # Full infrastructure management (PowerUserAccess excludes IAM
        # operations, but this deploy host must create IAM roles/policies
        # for the compute and storage stacks it deploys)
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-role'

  DeployHostInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-profile'
      Roles:
        - !Ref DeployHostRole

  # ========================================
  # SSM Session Manager Preferences
  # ========================================
  # Account-level document that configures all SSM sessions to run as
  # ubuntu with a bash login shell. Agent-level config does not work
  # reliably with the snap-installed SSM agent on Ubuntu.

  SSMSessionPreferences:
    Type: AWS::SSM::Document
    Properties:
      Name: SSM-SessionManagerRunShell
      DocumentType: Session
      DocumentFormat: JSON
      Content:
        schemaVersion: '1.0'
        description: Session Manager preferences - run as ubuntu with bash
        sessionType: Standard_Stream
        inputs:
          runAsEnabled: true
          runAsDefaultUser: ubuntu
          shellProfile:
            linux: cd ~ && exec bash -l

  # ========================================
  # EC2 Instance
  # ========================================

  DeployHostInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref DeployHostInstanceProfile
      SecurityGroupIds:
        - !Ref DeployHostSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              # ============================================================
              # Deploy Host UserData — minimal bootstrap
              #
              # Goal: get the box to a state where it can clone the project
              # repo and run scripts/deploy-host/bootstrap.sh from there.
              # All toolchain installation lives in bootstrap.sh — much
              # easier to debug, iterate on, and re-run manually.
              # ============================================================
              set -euo pipefail
              CF_REGION="${Region}"
              export AWS_DEFAULT_REGION=$CF_REGION
              export DEBIAN_FRONTEND=noninteractive
              export HOME=/root

              # Trace every command into the log
              exec > >(tee /var/log/deploy-host-bootstrap.log) 2>&1
              set -x

              echo "=== UserData starting $(date) ==="
              echo "Region: $CF_REGION"
              echo "Memory: $(free -h | awk '/^Mem:/ {print $3"/"$2}')"
              echo "Disk:   $(df -h / | awk 'NR==2 {print $3"/"$2" ("$5")"}')"

              # 2 GB swap (helps memory-intensive composer / npm operations)
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              sysctl vm.swappiness=10
              echo 'vm.swappiness=10' >> /etc/sysctl.conf

              # Just enough tools to clone the repo
              apt-get update -y
              apt-get install -y git jq unzip python3 curl

              # AWS CLI v2 (ARM64) — needed for Secrets Manager call
              cd /tmp
              curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              ./aws/install
              rm -rf aws awscliv2.zip
              cd /

              # GitHub deploy key from Secrets Manager (optional, non-fatal)
              echo "=== Configuring GitHub SSH access ==="
              mkdir -p /home/ubuntu/.ssh
              chmod 700 /home/ubuntu/.ssh
              SSH_SECRET=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/deploy-host/github-ssh-key" \
                --region $CF_REGION \
                --query 'SecretString' \
                --output text 2>/dev/null) || SSH_SECRET=""
              if [ -n "$SSH_SECRET" ]; then
                echo "$SSH_SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['private_key'])" > /home/ubuntu/.ssh/github_deploy_key
                echo "$SSH_SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['public_key'])"  > /home/ubuntu/.ssh/github_deploy_key.pub
                chmod 600 /home/ubuntu/.ssh/github_deploy_key
                chmod 644 /home/ubuntu/.ssh/github_deploy_key.pub
                cat > /home/ubuntu/.ssh/config << 'SSHCFGEOF'
              Host github.com
                IdentityFile ~/.ssh/github_deploy_key
                StrictHostKeyChecking accept-new
              SSHCFGEOF
                chmod 600 /home/ubuntu/.ssh/config
                chown -R ubuntu:ubuntu /home/ubuntu/.ssh
                unset SSH_SECRET
              else
                echo "WARN: worxco/deploy-host/github-ssh-key not found - bootstrap will fail at clone step"
              fi

              # Clone the repo
              mkdir -p /home/ubuntu/projects
              chown ubuntu:ubuntu /home/ubuntu/projects
              if [ -f /home/ubuntu/.ssh/github_deploy_key ]; then
                echo "=== Cloning repository ==="
                su - ubuntu -c 'cd ~/projects && git clone git@github.com:worx/cf-scalable-web.git'
                if [ -d /home/ubuntu/projects/cf-scalable-web ]; then
                  su - ubuntu -c 'cd ~/projects/cf-scalable-web && cp -n .env.example .env || true'
                fi
              fi

              # Hand off to the bootstrap script in the repo (the heavy lifting)
              REPO_DIR=/home/ubuntu/projects/cf-scalable-web
              if [ -x "$REPO_DIR/scripts/deploy-host/bootstrap.sh" ]; then
                echo "=== Running scripts/deploy-host/bootstrap.sh ==="
                bash "$REPO_DIR/scripts/deploy-host/bootstrap.sh"
              else
                echo "ERROR: $REPO_DIR/scripts/deploy-host/bootstrap.sh not found or not executable"
                echo "Check repo clone above. Bootstrap cannot continue."
                exit 1
              fi

              # ============================================================
              # Auto-restore operator state from sandbox S3 (if available)
              # ============================================================
              # After bootstrap completes, attempt to restore prior state
              # backup: SSH keys, .env files, .aws/config, custom bin/
              # directories for both root and ubuntu.
              #
              # If no backup exists in S3 (fresh migration or intentional
              # reset), this block quietly no-ops - deploy-host boots
              # with the pristine bootstrap state.
              #
              # Real .aws/credentials are NOT in the backup (secrets stay
              # on operator's Mac). restore-state.sh writes stub files
              # explaining this if credentials are absent post-restore.
              BACKUPS_BUCKET="${BackupsBucket}"
              LATEST_KEY="config/deploy-host-latest.tar.gz"

              # Each fallible step is guarded with `|| { echo REASON; ...; }` so
              # a missing S3 object (e.g. restore-state.sh not yet uploaded
              # because the operator has only ever run backup, never restore)
              # no longer trips `set -e` and kills the whole UserData script.
              # --quiet is intentionally dropped so aws cli errors land in the log.
              if aws s3api head-object \
                   --bucket "$BACKUPS_BUCKET" --key "$LATEST_KEY" >/dev/null 2>&1; then
                echo "=== Prior deploy-host state found in S3 - attempting restore ==="
                mkdir -p /opt/deploy-host/scripts/deploy-host
                # Pull the actual restore-state.sh (not a copy embedded here)
                # so we always run the current version from S3 - same
                # script the operator uses via `make restore-deploy-host`.
                RESTORE_READY=1
                aws s3 cp "s3://$BACKUPS_BUCKET/scripts/_common.sh" \
                          /opt/deploy-host/scripts/_common.sh \
                  || { echo "WARN: could not fetch scripts/_common.sh from S3 - skipping restore"; RESTORE_READY=0; }
                if [ "$RESTORE_READY" = "1" ]; then
                  aws s3 cp "s3://$BACKUPS_BUCKET/scripts/deploy-host/restore-state.sh" \
                            /opt/deploy-host/scripts/deploy-host/restore-state.sh \
                    || { echo "WARN: could not fetch scripts/deploy-host/restore-state.sh from S3 - skipping restore (run 'make restore-deploy-host' from the operator Mac to upload it)"; RESTORE_READY=0; }
                fi
                if [ "$RESTORE_READY" = "1" ]; then
                  chmod +x /opt/deploy-host/scripts/deploy-host/restore-state.sh
                  # CONFIRMED=yes - UserData is non-interactive
                  CONFIRMED=yes DEPLOY_HOST_BACKUPS_BUCKET="$BACKUPS_BUCKET" \
                    /opt/deploy-host/scripts/deploy-host/restore-state.sh \
                    || echo "WARN: restore-state.sh exited non-zero - partial or no restore"
                fi
              else
                echo "=== No prior deploy-host state in S3 - fresh instance ==="
              fi

              echo "=== UserData complete $(date) ==="
            - Region: !Ref 'AWS::Region'
              BackupsBucket: !Ref DeployHostBackupsBucketName

      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}'
        - Key: Purpose
          Value: Infrastructure management deploy host

  # ========================================
  # EventBridge Scheduler — nightly state backup
  # ========================================
  # Fires at 02:00 America/Chicago every day (DST-aware, no drift).
  # Assumes DeployHostSchedulerRole, calls ssm:SendCommand to push
  # backup-state.sh onto the deploy-host — same pattern as
  # `make backup-deploy-host` from the operator side.
  #
  # Prerequisites for the scheduled backup to succeed:
  #   1. cf-deploy-host-backups stack must be deployed (creates the bucket)
  #   2. scripts/_common.sh and scripts/deploy-host/backup-state.sh must
  #      exist in the bucket (uploaded automatically the first time an
  #      operator runs `make backup-deploy-host`)
  # First-time bootstrap: run `make backup-deploy-host` once after deploy.

  DeployHostSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-scheduler-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendCommandToDeployHost
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  # Scope tightly: only THIS deploy-host instance, only the
                  # AWS-RunShellScript document.
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${DeployHostInstance}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-scheduler-role'
        - Key: Purpose
          Value: Deploy-host nightly backup scheduler

  DeployHostNightlyBackupSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub '${AWS::StackName}-nightly-backup'
      Description: >-
        Nightly backup of deploy-host operator-managed state to sandbox S3.
        Fires at 02:00 America/Chicago (DST-aware).
      ScheduleExpression: cron(0 2 * * ? *)
      ScheduleExpressionTimezone: America/Chicago
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        # Universal target: invoke any AWS API. Here: ssm:SendCommand.
        Arn: 'arn:aws:scheduler:::aws-sdk:ssm:sendCommand'
        RoleArn: !GetAtt DeployHostSchedulerRole.Arn
        # Note: dash (default SSM shell) so `set -eu`, not `-o pipefail`.
        Input: !Sub |
          {
            "DocumentName": "AWS-RunShellScript",
            "InstanceIds": ["${DeployHostInstance}"],
            "TimeoutSeconds": 600,
            "Parameters": {
              "commands": [
                "set -eu",
                "mkdir -p /opt/deploy-host/scripts/deploy-host",
                "aws s3 cp \"s3://${DeployHostBackupsBucketName}/scripts/_common.sh\" /opt/deploy-host/scripts/_common.sh --quiet",
                "aws s3 cp \"s3://${DeployHostBackupsBucketName}/scripts/deploy-host/backup-state.sh\" /opt/deploy-host/scripts/deploy-host/backup-state.sh --quiet",
                "chmod +x /opt/deploy-host/scripts/deploy-host/backup-state.sh",
                "DEPLOY_HOST_BACKUPS_BUCKET=${DeployHostBackupsBucketName} /opt/deploy-host/scripts/deploy-host/backup-state.sh"
              ]
            }
          }

Outputs:
  DeployHostPublicIP:
    Description: Deploy host public IP (for outbound internet only - no inbound ports open)
    Value: !GetAtt DeployHostInstance.PublicIp

  DeployHostInstanceId:
    Description: Deploy host EC2 instance ID
    Value: !Ref DeployHostInstance
    Export:
      Name: !Sub '${AWS::StackName}-instance-id'

  SSMCommand:
    Description: SSM Session Manager command (primary access method)
    Value: !Sub 'aws ssm start-session --target ${DeployHostInstance}'

  SecurityGroupId:
    Description: Deploy host security group ID (sg-xxxxxxxxx)
    Value: !GetAtt DeployHostSecurityGroup.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-sg-id'

  NightlyBackupScheduleName:
    Description: EventBridge Scheduler name (fires nightly 02:00 America/Chicago)
    Value: !Ref DeployHostNightlyBackupSchedule


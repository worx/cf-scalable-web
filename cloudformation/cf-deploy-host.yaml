#
# CloudFormation Template: Deploy Host
#
# Purpose: Creates a standalone deploy host in the default VPC for
#          managing cf-scalable-web infrastructure deployments.
#
# Features:
#   - Uses default VPC (survives project VPC teardowns)
#   - Ubuntu 24.04 LTS on ARM (t4g.micro, 1GB RAM + 2GB swap)
#   - SSM Session Manager access only (no SSH inbound)
#   - Public IP for outbound internet (apt-get, git, AWS APIs)
#   - No inbound ports open (security group blocks all ingress)
#   - IAM instance role provides AdministratorAccess (no keys needed)
#   - Pre-installed: AWS CLI, git, make, screen, tmux, vim, Claude Code
#
# Dependencies: None (standalone)
#
# Usage:
#   make deploy-deploy-host
#   make verify-deploy-host
#   make destroy-deploy-host
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Standalone deploy host for cf-scalable-web infrastructure management'

Parameters:
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t4g.micro
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Ubuntu 24.04 LTS ARM64 AMI (resolved from SSM)
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

Resources:
  # ========================================
  # Security Group (no inbound, SSM only)
  # ========================================

  DeployHostSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg'
      GroupDescription: Security group for deploy host - no inbound, SSM access only
      # Uses default VPC automatically
      # No SecurityGroupIngress — all inbound blocked
      # Default egress allows all outbound (needed for package installs, AWS API calls)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  # ========================================
  # IAM Role (Admin + SSM)
  # ========================================

  DeployHostRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager access
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # Full infrastructure management (PowerUserAccess excludes IAM
        # operations, but this deploy host must create IAM roles/policies
        # for the compute and storage stacks it deploys)
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-role'

  DeployHostInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-profile'
      Roles:
        - !Ref DeployHostRole

  # ========================================
  # SSM Session Manager Preferences
  # ========================================
  # Account-level document that configures all SSM sessions to run as
  # ubuntu with a bash login shell. Agent-level config does not work
  # reliably with the snap-installed SSM agent on Ubuntu.

  SSMSessionPreferences:
    Type: AWS::SSM::Document
    Properties:
      Name: SSM-SessionManagerRunShell
      DocumentType: Session
      DocumentFormat: JSON
      Content:
        schemaVersion: '1.0'
        description: Session Manager preferences - run as ubuntu with bash
        sessionType: Standard_Stream
        inputs:
          runAsEnabled: true
          runAsDefaultUser: ubuntu
          shellProfile:
            linux: cd ~ && exec bash -l

  # ========================================
  # EC2 Instance
  # ========================================

  DeployHostInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref DeployHostInstanceProfile
      SecurityGroupIds:
        - !Ref DeployHostSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -euo pipefail
              # CloudFormation-injected region (used below, then baked into profile)
              CF_REGION="${Region}"
              exec > >(tee /var/log/deploy-host-bootstrap.log) 2>&1

              echo "=== Deploy Host Bootstrap Starting $(date) ==="

              # Create 2GB swap (supplements t4g.micro's 1GB RAM)
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              sysctl vm.swappiness=10
              echo 'vm.swappiness=10' >> /etc/sysctl.conf
              echo "Swap enabled: $(swapon --show) (swappiness=10)"

              # System updates
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y

              # Upgrade is best-effort: transient mirror 404s on fresh AMIs are common
              apt-get upgrade -y || apt-get upgrade -y --fix-missing || {
                echo "WARNING: apt-get upgrade failed (non-fatal, continuing)"
              }

              # Core tools
              apt-get install -y \
                git \
                make \
                jq \
                screen \
                tmux \
                tree \
                vim \
                unzip \
                python3-pip \
                python3-venv

              # Make vim the default editor (not nano!)
              update-alternatives --set editor /usr/bin/vim.basic
              cat > /etc/profile.d/deploy-host-env.sh <<ENVEOF
              export EDITOR=vim
              export VISUAL=vim
              export AWS_PAGER=""
              export AWS_CLI_AUTO_PROMPT=off
              export AWS_DEFAULT_REGION=$CF_REGION
              ENVEOF

              # Set vim as default for git
              su - ubuntu -c 'git config --global core.editor vim'

              # AWS CLI v2 (ARM64)
              cd /tmp
              curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              ./aws/install
              rm -rf aws awscliv2.zip

              # Create ~/.aws with README explaining instance role credentials
              mkdir -p /home/ubuntu/.aws
              cat > /home/ubuntu/.aws/README.md << 'AWSEOF'
              # AWS Credentials on Deploy Host

              This instance uses an IAM Instance Role for AWS access.
              No access keys or credentials files are needed.

              The instance role provides AdministratorAccess to this
              AWS account via the EC2 instance metadata service (IMDS).

              All AWS CLI commands work automatically:
                aws sts get-caller-identity    # verify your identity
                aws s3 ls                      # list buckets
                aws cloudformation list-stacks # list stacks

              The default region is set via /etc/profile.d/deploy-host-env.sh.
              Override per-command with: --region us-west-2
              Override per-session with: export AWS_DEFAULT_REGION=us-west-2

              DO NOT place access keys on this instance.
              The instance role is more secure (automatic rotation, no key files).
              AWSEOF
              chown -R ubuntu:ubuntu /home/ubuntu/.aws

              # Root password from Secrets Manager (optional, non-fatal)
              echo "=== Setting root password from Secrets Manager ==="
              ROOT_PASS=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/deploy-host/root-password" \
                --region $CF_REGION \
                --query 'SecretString' \
                --output text 2>/dev/null) || true
              if [ -n "$ROOT_PASS" ]; then
                echo "root:$ROOT_PASS" | chpasswd
                echo "Root password set from Secrets Manager"
                unset ROOT_PASS
              else
                echo "WARNING: worxco/deploy-host/root-password not found in Secrets Manager - skipping"
              fi

              # cfn-lint for template validation (venv avoids system package conflicts
              # and keeps memory usage low on t4g.nano's 512MB)
              python3 -m venv /opt/cfn-lint --system-site-packages
              /opt/cfn-lint/bin/pip install cfn-lint
              ln -sf /opt/cfn-lint/bin/cfn-lint /usr/local/bin/cfn-lint

              # Node.js 20.x LTS (for Claude Code)
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs

              # Claude Code CLI
              npm install -g @anthropic-ai/claude-code

              # Ensure SSM Agent is running (usually pre-installed on Ubuntu)
              # Note: SSM session preferences (RunAs user, shell) are configured
              # via the SSM-SessionManagerRunShell document (account-level),
              # not via agent config. See SSMSessionPreferences resource below.
              snap install amazon-ssm-agent --classic || true
              systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service || true
              systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true

              # Configure GitHub SSH access from Secrets Manager
              echo "=== Configuring GitHub SSH access ==="
              mkdir -p /home/ubuntu/.ssh
              chmod 700 /home/ubuntu/.ssh
              SSH_SECRET=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/deploy-host/github-ssh-key" \
                --region $CF_REGION \
                --query 'SecretString' \
                --output text 2>/dev/null) || true
              if [ -n "$SSH_SECRET" ]; then
                echo "$SSH_SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['private_key'])" > /home/ubuntu/.ssh/github_deploy_key
                echo "$SSH_SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['public_key'])" > /home/ubuntu/.ssh/github_deploy_key.pub
                chmod 600 /home/ubuntu/.ssh/github_deploy_key
                chmod 644 /home/ubuntu/.ssh/github_deploy_key.pub
                cat > /home/ubuntu/.ssh/config << 'SSHCFGEOF'
              Host github.com
                IdentityFile ~/.ssh/github_deploy_key
                StrictHostKeyChecking accept-new
              SSHCFGEOF
                chmod 600 /home/ubuntu/.ssh/config
                chown -R ubuntu:ubuntu /home/ubuntu/.ssh
                echo "GitHub SSH key configured"
                unset SSH_SECRET
              else
                echo "WARNING: worxco/deploy-host/github-ssh-key not found - manual git clone required"
              fi

              # Create working directory and clone repo
              mkdir -p /home/ubuntu/projects
              chown ubuntu:ubuntu /home/ubuntu/projects
              if [ -f /home/ubuntu/.ssh/github_deploy_key ]; then
                echo "=== Cloning repository ==="
                su - ubuntu -c 'cd ~/projects && git clone git@github.com:worx/cf-scalable-web.git 2>&1' || {
                  echo "WARNING: git clone failed (deploy key may not be configured on GitHub yet)"
                }
                if [ -d /home/ubuntu/projects/cf-scalable-web ]; then
                  su - ubuntu -c 'cd ~/projects/cf-scalable-web && cp .env.example .env'
                  echo "Repository cloned and .env configured"
                fi
              fi

              # ===========================================
              # Phase B: Drupal Management Toolchain
              # ===========================================
              # Tools that turn the deploy host into a Drupal management
              # workstation. Available once cf-deploy-peering is in place
              # (see docs/plans/drupal-install.md).

              echo "=== Installing Drupal management toolchain ==="

              # NFS client — mount FSx OpenZFS for Drupal codebase
              # PostgreSQL client — psql for ad-hoc DB ops + install bootstrap
              # redis-tools — provides redis-cli (Valkey is wire-compatible)
              apt-get install -y \
                nfs-common \
                postgresql-client \
                redis-tools

              # PHP 8.3 CLI + extensions required for Drupal 11 + Drush
              # (Ubuntu 24.04 ships PHP 8.3 in default repos — no PPA needed)
              apt-get install -y \
                php8.3-cli \
                php8.3-common \
                php8.3-curl \
                php8.3-mbstring \
                php8.3-xml \
                php8.3-zip \
                php8.3-gd \
                php8.3-pgsql \
                php8.3-intl \
                php8.3-bcmath \
                php8.3-opcache

              # Composer (latest stable)
              curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
              php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
              rm /tmp/composer-setup.php
              echo "Composer installed: $(composer --version 2>&1 | head -1)"

              # Drush via composer global (installs to ~ubuntu/.config/composer/vendor)
              su - ubuntu -c 'composer global require drush/drush' || {
                echo "WARNING: drush install failed (non-fatal — install manually if needed)"
              }
              # Add composer global bin to PATH for ubuntu user
              echo 'export PATH="$HOME/.config/composer/vendor/bin:$PATH"' \
                >> /home/ubuntu/.bashrc

              # AWS Session Manager plugin (better SSM CLI experience)
              curl -sS \
                "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_arm64/session-manager-plugin.deb" \
                -o /tmp/session-manager-plugin.deb
              dpkg -i /tmp/session-manager-plugin.deb || true
              rm -f /tmp/session-manager-plugin.deb

              # Marker file: lets scripts and Make targets detect "running on
              # deploy host" vs "running on the user's Mac".
              mkdir -p /etc/worxco
              echo "deploy-host" > /etc/worxco/deploy-host-marker
              chmod 644 /etc/worxco/deploy-host-marker

              # Per-environment cached endpoint config directory.
              mkdir -p /etc/worxco/envs
              chmod 755 /etc/worxco/envs

              # Install helper scripts from the cloned repo.
              # The scripts live in scripts/deploy-host/ in the project repo
              # as normal editable bash files (no UserData escaping pain).
              # To update an existing deploy host without redeploying the
              # stack, edit a script in the repo and re-run the install line.
              REPO_DIR=/home/ubuntu/projects/cf-scalable-web
              if [ -d "$REPO_DIR/scripts/deploy-host" ]; then
                echo "=== Installing helper scripts from repo ==="
                install -m 0755 "$REPO_DIR/scripts/deploy-host/info-env"           /usr/local/bin/info-env
                install -m 0755 "$REPO_DIR/scripts/deploy-host/show-env"           /usr/local/bin/show-env
                install -m 0755 "$REPO_DIR/scripts/deploy-host/psql-env"           /usr/local/bin/psql-env
                install -m 0755 "$REPO_DIR/scripts/deploy-host/valkey-env"         /usr/local/bin/valkey-env
                install -m 0755 "$REPO_DIR/scripts/deploy-host/mount-env"          /usr/local/sbin/mount-env
                install -m 0755 "$REPO_DIR/scripts/deploy-host/refresh-env-config" /usr/local/sbin/refresh-env-config
                install -m 0440 "$REPO_DIR/scripts/deploy-host/worxco-refresh-env-config.sudoers" /etc/sudoers.d/worxco-refresh-env-config
                echo "Helper scripts installed."

                # Best-effort: refresh now for any envs already deployed
                /usr/local/sbin/refresh-env-config sandbox staging production || true
              else
                echo "WARNING: $REPO_DIR/scripts/deploy-host not found — helpers not installed."
              fi

              echo "=== Drupal management toolchain installed ==="

              # Create static /etc/motd (SSM doesn't run update-motd.d scripts)
              cat > /etc/motd <<MOTDEOF

              ============================================
                cf-scalable-web Deploy Host
              ============================================

              Quick Start:
                cd ~/projects/cf-scalable-web
                tmux new -s deploy
                make deploy-all ENV=sandbox
                # Ctrl-B D to detach

              Reconnect:
                tmux attach -t deploy

              Access: SSM Session Manager only (no SSH)
              AWS:    Instance role provides AdministratorAccess
              Region: $CF_REGION (override with export AWS_DEFAULT_REGION=...)
              Tools:  aws, git, make, tmux, screen, vim, claude
                      php, composer, drush, psql, redis-cli, mount-env

              Project helpers (auto-resolve endpoints — no manual lookups):
                info-env sandbox                  # live endpoints from SSM
                show-env sandbox                  # cached endpoints (instant)
                source /etc/worxco/envs/sandbox   # set RDS_ENDPOINT, FSX_DNS, etc.
                sudo refresh-env-config sandbox   # rebuild cache from SSM
                sudo mount-env sandbox            # mount FSx at /var/www/sandbox
                psql-env sandbox                  # psql shell against env's RDS
                psql-env sandbox -c "SELECT now();"
                valkey-env sandbox PING           # Valkey/Redis CLI

              Drupal management (after sandbox is fully deployed):
                cd /var/www/sandbox/drupal        # navigate to Drupal install
                drush cr                          # clear caches
                drush updb -y                     # apply pending DB updates

              MOTDEOF

              # Display motd on interactive bash sessions (SSM, tmux, etc.)
              cat >> /home/ubuntu/.bashrc << 'RCEOF'

              # Show motd on interactive login
              if [ -f /etc/motd ] && [ -z "$MOTD_SHOWN" ]; then
                cat /etc/motd
                export MOTD_SHOWN=1
              fi
              RCEOF
              chown ubuntu:ubuntu /home/ubuntu/.bashrc

              echo "=== Deploy Host Bootstrap Complete $(date) ==="
              echo "SUCCESS" > /var/log/deploy-host-bootstrap-status
            - Region: !Ref 'AWS::Region'

      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}'
        - Key: Purpose
          Value: Infrastructure management deploy host

Outputs:
  DeployHostPublicIP:
    Description: Deploy host public IP (for outbound internet only - no inbound ports open)
    Value: !GetAtt DeployHostInstance.PublicIp

  DeployHostInstanceId:
    Description: Deploy host EC2 instance ID
    Value: !Ref DeployHostInstance
    Export:
      Name: !Sub '${AWS::StackName}-instance-id'

  SSMCommand:
    Description: SSM Session Manager command (primary access method)
    Value: !Sub 'aws ssm start-session --target ${DeployHostInstance}'

  SecurityGroupId:
    Description: Deploy host security group ID (sg-xxxxxxxxx)
    Value: !GetAtt DeployHostSecurityGroup.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-sg-id'


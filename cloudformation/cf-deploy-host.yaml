#
# CloudFormation Template: Deploy Host
#
# Purpose: Creates a standalone deploy host in the default VPC for
#          managing cf-scalable-web infrastructure deployments.
#
# Features:
#   - Uses default VPC (survives project VPC teardowns)
#   - Ubuntu 24.04 LTS on ARM (t4g.micro, 1GB RAM + 2GB swap)
#   - SSM Session Manager access only (no SSH inbound)
#   - Public IP for outbound internet (apt-get, git, AWS APIs)
#   - No inbound ports open (security group blocks all ingress)
#   - IAM instance role provides AdministratorAccess (no keys needed)
#   - Pre-installed: AWS CLI, git, make, screen, tmux, vim, Claude Code
#
# Dependencies: None (standalone)
#
# Usage:
#   make deploy-deploy-host
#   make verify-deploy-host
#   make destroy-deploy-host
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Standalone deploy host for cf-scalable-web infrastructure management'

Parameters:
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t4g.micro
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Ubuntu 24.04 LTS ARM64 AMI (resolved from SSM)
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

Resources:
  # ========================================
  # Security Group (no inbound, SSM only)
  # ========================================

  DeployHostSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg'
      GroupDescription: Security group for deploy host - no inbound, SSM access only
      # Uses default VPC automatically
      # No SecurityGroupIngress — all inbound blocked
      # Default egress allows all outbound (needed for package installs, AWS API calls)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  # ========================================
  # IAM Role (Admin + SSM)
  # ========================================

  DeployHostRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager access
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # Full infrastructure management (PowerUserAccess excludes IAM
        # operations, but this deploy host must create IAM roles/policies
        # for the compute and storage stacks it deploys)
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-role'

  DeployHostInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-profile'
      Roles:
        - !Ref DeployHostRole

  # ========================================
  # SSM Session Manager Preferences
  # ========================================
  # Account-level document that configures all SSM sessions to run as
  # ubuntu with a bash login shell. Agent-level config does not work
  # reliably with the snap-installed SSM agent on Ubuntu.

  SSMSessionPreferences:
    Type: AWS::SSM::Document
    Properties:
      Name: SSM-SessionManagerRunShell
      DocumentType: Session
      DocumentFormat: JSON
      Content:
        schemaVersion: '1.0'
        description: Session Manager preferences - run as ubuntu with bash
        sessionType: Standard_Stream
        inputs:
          runAsEnabled: true
          runAsDefaultUser: ubuntu
          shellProfile:
            linux: cd ~ && exec bash -l

  # ========================================
  # EC2 Instance
  # ========================================

  DeployHostInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref DeployHostInstanceProfile
      SecurityGroupIds:
        - !Ref DeployHostSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -euo pipefail
              # CloudFormation-injected region (used below, then baked into profile)
              CF_REGION="${Region}"
              exec > >(tee /var/log/deploy-host-bootstrap.log) 2>&1

              echo "=== Deploy Host Bootstrap Starting $(date) ==="

              # Create 2GB swap (supplements t4g.micro's 1GB RAM)
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              sysctl vm.swappiness=10
              echo 'vm.swappiness=10' >> /etc/sysctl.conf
              echo "Swap enabled: $(swapon --show) (swappiness=10)"

              # System updates
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y

              # Upgrade is best-effort: transient mirror 404s on fresh AMIs are common
              apt-get upgrade -y || apt-get upgrade -y --fix-missing || {
                echo "WARNING: apt-get upgrade failed (non-fatal, continuing)"
              }

              # Core tools
              apt-get install -y \
                git \
                make \
                jq \
                screen \
                tmux \
                tree \
                vim \
                unzip \
                python3-pip \
                python3-venv

              # Make vim the default editor (not nano!)
              update-alternatives --set editor /usr/bin/vim.basic
              cat > /etc/profile.d/deploy-host-env.sh <<ENVEOF
              export EDITOR=vim
              export VISUAL=vim
              export AWS_PAGER=""
              export AWS_CLI_AUTO_PROMPT=off
              export AWS_DEFAULT_REGION=$CF_REGION
              ENVEOF

              # Set vim as default for git
              su - ubuntu -c 'git config --global core.editor vim'

              # AWS CLI v2 (ARM64)
              cd /tmp
              curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              ./aws/install
              rm -rf aws awscliv2.zip

              # Create ~/.aws with README explaining instance role credentials
              mkdir -p /home/ubuntu/.aws
              cat > /home/ubuntu/.aws/README.md << 'AWSEOF'
              # AWS Credentials on Deploy Host

              This instance uses an IAM Instance Role for AWS access.
              No access keys or credentials files are needed.

              The instance role provides AdministratorAccess to this
              AWS account via the EC2 instance metadata service (IMDS).

              All AWS CLI commands work automatically:
                aws sts get-caller-identity    # verify your identity
                aws s3 ls                      # list buckets
                aws cloudformation list-stacks # list stacks

              The default region is set via /etc/profile.d/deploy-host-env.sh.
              Override per-command with: --region us-west-2
              Override per-session with: export AWS_DEFAULT_REGION=us-west-2

              DO NOT place access keys on this instance.
              The instance role is more secure (automatic rotation, no key files).
              AWSEOF
              chown -R ubuntu:ubuntu /home/ubuntu/.aws

              # Root password from Secrets Manager (optional, non-fatal)
              echo "=== Setting root password from Secrets Manager ==="
              ROOT_PASS=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/deploy-host/root-password" \
                --region $CF_REGION \
                --query 'SecretString' \
                --output text 2>/dev/null) || true
              if [ -n "$ROOT_PASS" ]; then
                echo "root:$ROOT_PASS" | chpasswd
                echo "Root password set from Secrets Manager"
                unset ROOT_PASS
              else
                echo "WARNING: worxco/deploy-host/root-password not found in Secrets Manager - skipping"
              fi

              # cfn-lint for template validation (venv avoids system package conflicts
              # and keeps memory usage low on t4g.nano's 512MB)
              python3 -m venv /opt/cfn-lint --system-site-packages
              /opt/cfn-lint/bin/pip install cfn-lint
              ln -sf /opt/cfn-lint/bin/cfn-lint /usr/local/bin/cfn-lint

              # Node.js 20.x LTS (for Claude Code)
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs

              # Claude Code CLI
              npm install -g @anthropic-ai/claude-code

              # Ensure SSM Agent is running (usually pre-installed on Ubuntu)
              # Note: SSM session preferences (RunAs user, shell) are configured
              # via the SSM-SessionManagerRunShell document (account-level),
              # not via agent config. See SSMSessionPreferences resource below.
              snap install amazon-ssm-agent --classic || true
              systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service || true
              systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true

              # Configure GitHub SSH access from Secrets Manager
              echo "=== Configuring GitHub SSH access ==="
              mkdir -p /home/ubuntu/.ssh
              chmod 700 /home/ubuntu/.ssh
              SSH_SECRET=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/deploy-host/github-ssh-key" \
                --region $CF_REGION \
                --query 'SecretString' \
                --output text 2>/dev/null) || true
              if [ -n "$SSH_SECRET" ]; then
                echo "$SSH_SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['private_key'])" > /home/ubuntu/.ssh/github_deploy_key
                echo "$SSH_SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['public_key'])" > /home/ubuntu/.ssh/github_deploy_key.pub
                chmod 600 /home/ubuntu/.ssh/github_deploy_key
                chmod 644 /home/ubuntu/.ssh/github_deploy_key.pub
                cat > /home/ubuntu/.ssh/config << 'SSHCFGEOF'
              Host github.com
                IdentityFile ~/.ssh/github_deploy_key
                StrictHostKeyChecking accept-new
              SSHCFGEOF
                chmod 600 /home/ubuntu/.ssh/config
                chown -R ubuntu:ubuntu /home/ubuntu/.ssh
                echo "GitHub SSH key configured"
                unset SSH_SECRET
              else
                echo "WARNING: worxco/deploy-host/github-ssh-key not found - manual git clone required"
              fi

              # Create working directory and clone repo
              mkdir -p /home/ubuntu/projects
              chown ubuntu:ubuntu /home/ubuntu/projects
              if [ -f /home/ubuntu/.ssh/github_deploy_key ]; then
                echo "=== Cloning repository ==="
                su - ubuntu -c 'cd ~/projects && git clone git@github.com:worx/cf-scalable-web.git 2>&1' || {
                  echo "WARNING: git clone failed (deploy key may not be configured on GitHub yet)"
                }
                if [ -d /home/ubuntu/projects/cf-scalable-web ]; then
                  su - ubuntu -c 'cd ~/projects/cf-scalable-web && cp .env.example .env'
                  echo "Repository cloned and .env configured"
                fi
              fi

              # ===========================================
              # Phase B: Drupal Management Toolchain
              # ===========================================
              # Tools that turn the deploy host into a Drupal management
              # workstation. Available once cf-deploy-peering is in place
              # (see docs/plans/drupal-install.md).

              echo "=== Installing Drupal management toolchain ==="

              # NFS client — mount FSx OpenZFS for Drupal codebase
              # PostgreSQL client — psql for ad-hoc DB ops + install bootstrap
              # redis-tools — provides redis-cli (Valkey is wire-compatible)
              apt-get install -y \
                nfs-common \
                postgresql-client \
                redis-tools

              # PHP 8.3 CLI + extensions required for Drupal 11 + Drush
              # (Ubuntu 24.04 ships PHP 8.3 in default repos — no PPA needed)
              apt-get install -y \
                php8.3-cli \
                php8.3-common \
                php8.3-curl \
                php8.3-mbstring \
                php8.3-xml \
                php8.3-zip \
                php8.3-gd \
                php8.3-pgsql \
                php8.3-intl \
                php8.3-bcmath \
                php8.3-opcache

              # Composer (latest stable)
              curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
              php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
              rm /tmp/composer-setup.php
              echo "Composer installed: $(composer --version 2>&1 | head -1)"

              # Drush via composer global (installs to ~ubuntu/.config/composer/vendor)
              su - ubuntu -c 'composer global require drush/drush' || {
                echo "WARNING: drush install failed (non-fatal — install manually if needed)"
              }
              # Add composer global bin to PATH for ubuntu user
              echo 'export PATH="$HOME/.config/composer/vendor/bin:$PATH"' \
                >> /home/ubuntu/.bashrc

              # AWS Session Manager plugin (better SSM CLI experience)
              curl -sS \
                "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_arm64/session-manager-plugin.deb" \
                -o /tmp/session-manager-plugin.deb
              dpkg -i /tmp/session-manager-plugin.deb || true
              rm -f /tmp/session-manager-plugin.deb

              # mount-env: helper to mount a project FSx for the named environment
              # Usage: sudo mount-env sandbox
              # Looks up FSx DNS from SSM /<env>/fsx/dns-name and mounts at /var/www/<env>
              mkdir -p /usr/local/sbin
              cat > /usr/local/sbin/mount-env << 'MOUNTEOF'
              #!/bin/bash
              set -euo pipefail
              if [ "$#" -lt 1 ]; then
                echo "Usage: mount-env <environment>"
                echo "Mounts /var/www/<env> from FSx OpenZFS for the named environment."
                echo "Example: mount-env sandbox"
                exit 1
              fi
              ENV="$1"
              MOUNT_POINT="/var/www/$ENV"
              if mountpoint -q "$MOUNT_POINT" 2>/dev/null; then
                echo "$MOUNT_POINT is already mounted"
                exit 0
              fi
              FSX_DNS=$(aws ssm get-parameter \
                --name "/$ENV/fsx/dns-name" \
                --query 'Parameter.Value' \
                --output text 2>/dev/null) || {
                echo "ERROR: SSM parameter /$ENV/fsx/dns-name not found."
                echo "FSx for environment '$ENV' may not be deployed yet,"
                echo "or VPC peering (cf-deploy-peering) is not in place."
                exit 1
              }
              mkdir -p "$MOUNT_POINT"
              mount -t nfs4 -o vers=4.1,port=2049 "$FSX_DNS:/fsx" "$MOUNT_POINT"
              echo "Mounted $FSX_DNS:/fsx -> $MOUNT_POINT"
              MOUNTEOF
              chmod +x /usr/local/sbin/mount-env

              # info-env: print all project endpoints for a named environment
              # Usage: info-env sandbox
              # No-arg variant attempts to auto-detect (single env in account).
              cat > /usr/local/bin/info-env << 'INFOEOF'
              #!/bin/bash
              set -euo pipefail
              if [ "$#" -lt 1 ]; then
                echo "Usage: info-env <environment>"
                echo "Prints RDS, FSx, and Valkey endpoints for the named environment."
                echo "Pulls live from SSM Parameter Store — always current."
                exit 1
              fi
              ENV="$1"
              get_ssm() {
                aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text 2>/dev/null \
                  || echo "(not deployed)"
              }
              echo "Endpoints for environment: $ENV"
              echo "  RDS:        $(get_ssm /$ENV/rds/endpoint):5432"
              echo "  FSx (NFS):  $(get_ssm /$ENV/fsx/dns-name):/fsx"
              echo "  Valkey:     $(get_ssm /$ENV/cache/endpoint):6379"
              echo "  ALB DNS:    $(get_ssm /$ENV/compute/alb-dns-name)"
              echo ""
              echo "Database name:    drupal (from cf-database parameter)"
              echo "Database user:    dbadmin (from cf-database parameter)"
              echo "Master password:  worxco/$ENV/rds/master-password (Secrets Manager)"
              INFOEOF
              chmod +x /usr/local/bin/info-env

              # psql-env: connect to a project's RDS PostgreSQL with auto-resolved
              # endpoint and master password from Secrets Manager.
              # Usage: psql-env sandbox             # interactive shell
              #        psql-env sandbox -c "SELECT version();"  # one-off command
              cat > /usr/local/bin/psql-env << 'PSQLEOF'
              #!/bin/bash
              set -euo pipefail
              if [ "$#" -lt 1 ]; then
                echo "Usage: psql-env <environment> [psql args...]"
                echo "Examples:"
                echo "  psql-env sandbox"
                echo "  psql-env sandbox -c 'SELECT now();'"
                echo "  psql-env sandbox -d postgres   # different database"
                exit 1
              fi
              ENV="$1"
              shift
              RDS=$(aws ssm get-parameter --name "/$ENV/rds/endpoint" \
                --query 'Parameter.Value' --output text 2>/dev/null) || {
                echo "ERROR: SSM parameter /$ENV/rds/endpoint not found." >&2
                echo "Is RDS deployed for environment '$ENV'?" >&2
                exit 1
              }
              PASS=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/$ENV/rds/master-password" \
                --query SecretString --output text 2>/dev/null) || {
                echo "ERROR: Secret worxco/$ENV/rds/master-password not found." >&2
                exit 1
              }
              # Default to the drupal database; user args can override with -d
              PGPASSWORD="$PASS" psql -h "$RDS" -U dbadmin -d drupal "$@"
              PSQLEOF
              chmod +x /usr/local/bin/psql-env

              # valkey-env: connect to a project's ElastiCache Valkey with
              # auto-resolved endpoint and AUTH token.
              # Usage: valkey-env sandbox            # interactive shell
              #        valkey-env sandbox PING       # one-off command
              cat > /usr/local/bin/valkey-env << 'VALKEYEOF'
              #!/bin/bash
              set -euo pipefail
              if [ "$#" -lt 1 ]; then
                echo "Usage: valkey-env <environment> [redis-cli args...]"
                echo "Examples:"
                echo "  valkey-env sandbox PING"
                echo "  valkey-env sandbox INFO server"
                echo "  valkey-env sandbox            # interactive shell"
                exit 1
              fi
              ENV="$1"
              shift
              HOST=$(aws ssm get-parameter --name "/$ENV/cache/endpoint" \
                --query 'Parameter.Value' --output text 2>/dev/null) || {
                echo "ERROR: SSM parameter /$ENV/cache/endpoint not found." >&2
                echo "Is ElastiCache deployed for environment '$ENV'?" >&2
                exit 1
              }
              AUTH=$(aws secretsmanager get-secret-value \
                --secret-id "worxco/$ENV/cache/auth-token" \
                --query SecretString --output text 2>/dev/null) || {
                echo "ERROR: Secret worxco/$ENV/cache/auth-token not found." >&2
                exit 1
              }
              # ElastiCache Valkey uses TLS by default — pass --tls
              redis-cli -h "$HOST" -p 6379 --tls -a "$AUTH" "$@"
              VALKEYEOF
              chmod +x /usr/local/bin/valkey-env

              # Marker file: lets scripts and Make targets detect "running on deploy host"
              # vs running on the user's Mac (and needing to dispatch via SSM).
              mkdir -p /etc/worxco
              echo "deploy-host" > /etc/worxco/deploy-host-marker
              chmod 644 /etc/worxco/deploy-host-marker

              # Per-environment cached endpoint config directory.
              # Files written by refresh-env-config (root) and read by show-env (anyone).
              mkdir -p /etc/worxco/envs
              chmod 755 /etc/worxco/envs

              # refresh-env-config: regenerate /etc/worxco/envs/<env> from SSM
              # AND maintain /etc/hosts entries for FSx hostnames (which don't
              # resolve across VPC peering even with AllowDnsResolutionFromRemoteVpc).
              # Usage: sudo refresh-env-config              # all known envs (skips missing)
              #        sudo refresh-env-config sandbox      # specific env
              cat > /usr/local/sbin/refresh-env-config << 'REFRESHEOF'
              #!/bin/bash
              set -euo pipefail
              if [ "$#" -eq 0 ]; then
                set -- sandbox staging production
              fi

              # Pass 1: write /etc/worxco/envs/<env> for each requested env
              for ENV in "$@"; do
                RDS=$(aws ssm get-parameter --name "/$ENV/rds/endpoint" \
                  --query 'Parameter.Value' --output text 2>/dev/null) || RDS=""
                FSX=$(aws ssm get-parameter --name "/$ENV/fsx/dns-name" \
                  --query 'Parameter.Value' --output text 2>/dev/null) || FSX=""
                VALKEY=$(aws ssm get-parameter --name "/$ENV/cache/endpoint" \
                  --query 'Parameter.Value' --output text 2>/dev/null) || VALKEY=""
                ALB=$(aws ssm get-parameter --name "/$ENV/compute/alb-dns-name" \
                  --query 'Parameter.Value' --output text 2>/dev/null) || ALB=""
                if [ -z "$RDS" ] && [ -z "$FSX" ] && [ -z "$VALKEY" ]; then
                  echo "Skipping $ENV (no infrastructure deployed)"
                  continue
                fi
                OUT="/etc/worxco/envs/$ENV"
                cat > "$OUT" << EOF_INNER
              # Generated by refresh-env-config on $(date -u +'%Y-%m-%dT%H:%M:%SZ')
              # Source from a shell with: source /etc/worxco/envs/$ENV
              # Re-run: sudo refresh-env-config $ENV
              DRUPAL_ENV=$ENV
              RDS_ENDPOINT=$RDS
              RDS_PORT=5432
              RDS_USER=dbadmin
              RDS_DATABASE=drupal
              FSX_DNS=$FSX
              VALKEY_HOST=$VALKEY
              VALKEY_PORT=6379
              ALB_DNS=$ALB
              DRUPAL_PATH=/var/www/$ENV/drupal
              EOF_INNER
                chmod 644 "$OUT"
                echo "Wrote $OUT"
              done

              # Pass 2: rebuild the /etc/hosts FSx block.
              # FSx hostnames live in the project VPC's internal DNS resolver
              # only — they do NOT resolve across VPC peering even when the
              # AllowDnsResolutionFromRemoteVpc flag is set. We bridge the gap
              # by maintaining a marker block in /etc/hosts mapping each
              # deployed FSx hostname to its private IP.
              #
              # Always check all three known envs (sandbox, staging, production)
              # so a partial refresh doesn't drop entries for other envs.
              HOSTS_BLOCK=$(mktemp)
              trap "rm -f $HOSTS_BLOCK" EXIT
              for HENV in sandbox staging production; do
                HFSX=$(aws ssm get-parameter --name "/$HENV/fsx/dns-name" \
                  --query 'Parameter.Value' --output text 2>/dev/null) || continue
                [ -z "$HFSX" ] && continue
                [ "$HFSX" = "None" ] && continue
                HFSX_ID=$(echo "$HFSX" | cut -d. -f1)
                HNIC=$(aws fsx describe-file-systems \
                  --file-system-ids "$HFSX_ID" \
                  --query 'FileSystems[0].NetworkInterfaceIds[0]' \
                  --output text 2>/dev/null) || continue
                [ -z "$HNIC" ] && continue
                [ "$HNIC" = "None" ] && continue
                HIP=$(aws ec2 describe-network-interfaces \
                  --network-interface-ids "$HNIC" \
                  --query 'NetworkInterfaces[0].PrivateIpAddress' \
                  --output text 2>/dev/null) || continue
                [ -z "$HIP" ] && continue
                [ "$HIP" = "None" ] && continue
                echo "$HIP $HFSX  # $HENV" >> $HOSTS_BLOCK
              done

              # Replace the managed block in /etc/hosts atomically
              HOSTS_NEW=$(mktemp)
              awk '
                /# BEGIN worxco-fsx-hosts/ {skip=1; next}
                /# END worxco-fsx-hosts/ {skip=0; next}
                !skip
              ' /etc/hosts > $HOSTS_NEW
              if [ -s "$HOSTS_BLOCK" ]; then
                {
                  echo ""
                  echo "# BEGIN worxco-fsx-hosts (managed by refresh-env-config — do not edit)"
                  cat $HOSTS_BLOCK
                  echo "# END worxco-fsx-hosts"
                } >> $HOSTS_NEW
                echo "Updated /etc/hosts: $(wc -l < $HOSTS_BLOCK) FSx entries (managed block)"
              else
                echo "No FSx entries to manage in /etc/hosts (no environments deployed)"
              fi
              mv $HOSTS_NEW /etc/hosts
              chmod 644 /etc/hosts
              REFRESHEOF
              chmod 755 /usr/local/sbin/refresh-env-config

              # show-env: pretty-print the cached config (no sudo, no AWS calls — fast)
              # Usage: show-env sandbox
              cat > /usr/local/bin/show-env << 'SHOWEOF'
              #!/bin/bash
              set -euo pipefail
              if [ "$#" -lt 1 ]; then
                echo "Usage: show-env <environment>"
                echo "Pretty-prints the CACHED endpoint config for the named env."
                echo "(Run 'sudo refresh-env-config <env>' to refresh from SSM.)"
                echo ""
                echo "Available cached environments:"
                ls /etc/worxco/envs/ 2>/dev/null | sed 's/^/  /' || echo "  (none yet)"
                exit 1
              fi
              ENV="$1"
              FILE="/etc/worxco/envs/$ENV"
              if [ ! -f "$FILE" ]; then
                echo "ERROR: $FILE does not exist."
                echo "Run: sudo refresh-env-config $ENV"
                exit 1
              fi
              echo "Cached endpoints for: $ENV"
              echo "----------------------------------------"
              cat "$FILE"
              echo "----------------------------------------"
              echo "(For LIVE values from SSM, run: info-env $ENV)"
              SHOWEOF
              chmod 755 /usr/local/bin/show-env

              # sudoers.d entry: ubuntu can run refresh-env-config without password.
              # Mode 0440 is required by sudo (refuses to read otherwise).
              cat > /etc/sudoers.d/worxco-refresh-env-config << 'SUDOEOF'
              # Allow ubuntu to refresh /etc/worxco/envs/* without password.
              # The script reads SSM and writes /etc/worxco/envs/<env> with
              # endpoint configuration. No secrets are written to these files.
              ubuntu ALL=(root) NOPASSWD: /usr/local/sbin/refresh-env-config
              SUDOEOF
              chmod 440 /etc/sudoers.d/worxco-refresh-env-config

              # Best-effort: refresh now for any envs already deployed
              /usr/local/sbin/refresh-env-config sandbox staging production || true

              echo "=== Drupal management toolchain installed ==="

              # Create static /etc/motd (SSM doesn't run update-motd.d scripts)
              cat > /etc/motd <<MOTDEOF

              ============================================
                cf-scalable-web Deploy Host
              ============================================

              Quick Start:
                cd ~/projects/cf-scalable-web
                tmux new -s deploy
                make deploy-all ENV=sandbox
                # Ctrl-B D to detach

              Reconnect:
                tmux attach -t deploy

              Access: SSM Session Manager only (no SSH)
              AWS:    Instance role provides AdministratorAccess
              Region: $CF_REGION (override with export AWS_DEFAULT_REGION=...)
              Tools:  aws, git, make, tmux, screen, vim, claude
                      php, composer, drush, psql, redis-cli, mount-env

              Project helpers (auto-resolve endpoints — no manual lookups):
                info-env sandbox                  # live endpoints from SSM
                show-env sandbox                  # cached endpoints (instant)
                source /etc/worxco/envs/sandbox   # set RDS_ENDPOINT, FSX_DNS, etc.
                sudo refresh-env-config sandbox   # rebuild cache from SSM
                sudo mount-env sandbox            # mount FSx at /var/www/sandbox
                psql-env sandbox                  # psql shell against env's RDS
                psql-env sandbox -c "SELECT now();"
                valkey-env sandbox PING           # Valkey/Redis CLI

              Drupal management (after sandbox is fully deployed):
                cd /var/www/sandbox/drupal        # navigate to Drupal install
                drush cr                          # clear caches
                drush updb -y                     # apply pending DB updates

              MOTDEOF

              # Display motd on interactive bash sessions (SSM, tmux, etc.)
              cat >> /home/ubuntu/.bashrc << 'RCEOF'

              # Show motd on interactive login
              if [ -f /etc/motd ] && [ -z "$MOTD_SHOWN" ]; then
                cat /etc/motd
                export MOTD_SHOWN=1
              fi
              RCEOF
              chown ubuntu:ubuntu /home/ubuntu/.bashrc

              echo "=== Deploy Host Bootstrap Complete $(date) ==="
              echo "SUCCESS" > /var/log/deploy-host-bootstrap-status
            - Region: !Ref 'AWS::Region'

      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}'
        - Key: Purpose
          Value: Infrastructure management deploy host

Outputs:
  DeployHostPublicIP:
    Description: Deploy host public IP (for outbound internet only - no inbound ports open)
    Value: !GetAtt DeployHostInstance.PublicIp

  DeployHostInstanceId:
    Description: Deploy host EC2 instance ID
    Value: !Ref DeployHostInstance
    Export:
      Name: !Sub '${AWS::StackName}-instance-id'

  SSMCommand:
    Description: SSM Session Manager command (primary access method)
    Value: !Sub 'aws ssm start-session --target ${DeployHostInstance}'

  SecurityGroupId:
    Description: Deploy host security group ID (sg-xxxxxxxxx)
    Value: !GetAtt DeployHostSecurityGroup.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-sg-id'


#
# CloudFormation Template: Storage — S3 Buckets
#
# Purpose: Creates the three S3 buckets (media, backup, image-builder) and
#          their SSM parameter store entries. Split out from the old
#          combined cf-storage.yaml so this stack has NO VPC dependency
#          and can be deployed in parallel with cf-vpc.yaml.
#
# Why split: deploy-image-builder needs the image-builder S3 bucket name
# from SSM (/<env>/s3/image-builder-bucket). Previously that param was
# written by cf-storage which also created FSx, forcing image-builder
# to wait ~5 min for FSx provisioning to finish even though it only
# needed the bucket. Splitting removes the FSx wait from the AMI long-pole
# critical path. See scripts/deploy-all-parallel.py for the orchestration.
#
# Resources:
#   - 3 S3 buckets (drupal-media, backups, image-builder)
#   - 3 SSM parameters (bucket name lookups)
#
# Dependencies: NONE — buckets are global resources, no VPC required.
#
# Deploy time: ~30 sec.
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Storage S3 buckets (media + backup + image-builder) for cf-scalable-web'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name
    Default: production

  EnableS3Versioning:
    Type: String
    Description: Enable versioning on S3 buckets
    AllowedValues: [true, false]
    Default: true

  BucketSuffix:
    Type: String
    Description: Unique suffix for S3 bucket names (ensures global uniqueness)
    AllowedPattern: '^[a-z0-9-]{4,12}$'
    ConstraintDescription: Must be 4-12 lowercase letters, numbers, or hyphens
    Default: change-me

  # ============================================================
  # Cross-account media sync (sandbox only — leave empty on prod)
  # ============================================================
  # When set, adds a BucketPolicy to MediaBucket allowing a specific
  # cross-account role to write. Used for prod → sandbox media sync
  # so PDFs/downloads referenced by migrated Drupal actually resolve.
  # See migration/scripts/jumpbox/sync-s3-media.sh — jumpbox runs
  # `aws s3 sync` directly from prod's media bucket into sandbox's,
  # bypassing the intermediate migration bucket.
  #
  # PROD deployments MUST leave both parameters empty (the default) —
  # we don't want prod's media bucket accepting writes from any
  # cross-account principal.
  MigrationSourceAccountId:
    Type: String
    Description: |
      Optional. AWS account ID of the cross-account jumpbox that
      may sync INTO this env's MediaBucket. Empty = no policy attached.
    Default: ''
    AllowedPattern: '^([0-9]{12})?$'
    ConstraintDescription: Must be 12 digits (account ID) or empty.

  MigrationSourceRoleArnPattern:
    Type: String
    Description: |
      Optional. IAM role ARN pattern (wildcard OK) of the cross-account
      principal allowed to write into this env's MediaBucket. Scopes
      the policy tighter than the account root — only THIS role can
      write, even if other roles in the source account grant themselves
      S3 permissions. Empty disables the policy entirely.
    Default: ''

Conditions:
  S3VersioningEnabled: !Equals [!Ref EnableS3Versioning, true]
  EnableMigrationSourceWrite: !And
    - !Not [!Equals [!Ref MigrationSourceAccountId, '']]
    - !Not [!Equals [!Ref MigrationSourceRoleArnPattern, '']]

Resources:
  # ========================================
  # Drupal/WordPress Media Uploads
  # ========================================
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-drupal-media-${BucketSuffix}'
      VersioningConfiguration:
        Status: !If [S3VersioningEnabled, Enabled, Suspended]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
          - Id: AbortIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-drupal-media-${BucketSuffix}'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ============================================================
  # MediaBucket cross-account write (optional; sandbox-only)
  # ============================================================
  # Present only when MigrationSourceAccountId and *RoleArnPattern
  # are both set. Grants a specific cross-account jumpbox role
  # write access into this env's MediaBucket so `aws s3 sync` from
  # prod's media bucket lands directly here — no intermediate hop
  # through the migration bucket. Same principal-scoping pattern
  # used by cf-migration-bucket.yaml:129.
  #
  # PublicAccessBlockConfiguration.BlockPublicPolicy=true on the
  # bucket does NOT block cross-account policies scoped to a specific
  # principal ARN. That guard is only for policies that would grant
  # public (unauthenticated) access.
  MediaBucketMigrationSourcePolicy:
    Type: AWS::S3::BucketPolicy
    Condition: EnableMigrationSourceWrite
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCrossAccountMigrationSync
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${MigrationSourceAccountId}:root'
            Action:
              - 's3:PutObject'
              - 's3:PutObjectAcl'
              - 's3:GetObject'
              - 's3:ListBucket'
              - 's3:DeleteObject'
            Resource:
              - !GetAtt MediaBucket.Arn
              - !Sub '${MediaBucket.Arn}/*'
            Condition:
              StringLike:
                'aws:PrincipalArn': !Ref MigrationSourceRoleArnPattern

  # ========================================
  # Backups and Logs
  # ========================================
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-backups-${BucketSuffix}'
      VersioningConfiguration:
        Status: !If [S3VersioningEnabled, Enabled, Suspended]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
          - Id: ExpireOldBackups
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-backups-${BucketSuffix}'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Image Builder Scripts and Artifacts
  # ========================================
  ImageBuilderBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-image-builder-${BucketSuffix}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-image-builder-${BucketSuffix}'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # SSM Parameters
  # ========================================

  MediaBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/s3/media-bucket'
      Description: S3 bucket name for Drupal/WordPress media
      Type: String
      Value: !Ref MediaBucket
      Tags:
        Environment: !Ref EnvironmentName

  BackupBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/s3/backup-bucket'
      Description: S3 bucket name for backups
      Type: String
      Value: !Ref BackupBucket
      Tags:
        Environment: !Ref EnvironmentName

  ImageBuilderBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/s3/image-builder-bucket'
      Description: S3 bucket name for Image Builder artifacts
      Type: String
      Value: !Ref ImageBuilderBucket
      Tags:
        Environment: !Ref EnvironmentName

Outputs:
  MediaBucketName:
    Description: S3 bucket name for media uploads
    Value: !Ref MediaBucket
    Export:
      Name: !Sub '${EnvironmentName}-media-bucket-name'

  BackupBucketName:
    Description: S3 bucket name for backups
    Value: !Ref BackupBucket
    Export:
      Name: !Sub '${EnvironmentName}-backup-bucket-name'

  ImageBuilderBucketName:
    Description: S3 bucket name for Image Builder
    Value: !Ref ImageBuilderBucket
    Export:
      Name: !Sub '${EnvironmentName}-image-builder-bucket-name'


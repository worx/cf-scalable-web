#
# CloudFormation Template: ElastiCache Valkey
#
# Purpose: Creates Valkey cluster for page caching and session storage
#
# Features:
#   - Single node (dev/test) or cluster mode (production)
#   - Encryption in transit
#   - Auth token in Secrets Manager
#   - Automatic failover (Multi-AZ)
#
# Dependencies: cf-vpc.yaml (subnets, security groups)
#
# Outputs: Valkey endpoint, port, auth token ARN
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'ElastiCache Valkey cluster for scalable web hosting'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name
    Default: production

  SecretNamePrefix:
    Type: String
    Description: Secrets Manager prefix
    Default: worxco/production

  CacheNodeType:
    Type: String
    Description: ElastiCache node type
    Default: cache.t4g.micro
    AllowedValues:
      - cache.t4g.micro
      - cache.t4g.small
      - cache.t4g.medium
      - cache.r6g.large
      - cache.r6g.xlarge
      - cache.r6g.2xlarge

  NumCacheNodes:
    Type: Number
    Description: Number of cache nodes (1 for single node, 2+ for cluster)
    MinValue: 1
    MaxValue: 6
    Default: 1

  EnableMultiAZ:
    Type: String
    Description: Enable Multi-AZ with automatic failover (requires NumCacheNodes >= 2)
    AllowedValues: [true, false]
    Default: false

  ValkeyVersion:
    Type: String
    Description: Valkey engine version
    Default: '8.2'
    AllowedValues:
      - '8.2'
      - '8.1'
      - '8.0'
      - '7.2'

Conditions:
  MultiAZEnabled: !And
    - !Equals [!Ref EnableMultiAZ, true]
    - !Not [!Equals [!Ref NumCacheNodes, 1]]

Resources:
  # ========================================
  # Cache Subnet Group
  # ========================================

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub '${EnvironmentName}-cache-subnet-group'
      Description: Subnet group for ElastiCache Valkey
      SubnetIds: !Split
        - ','
        - Fn::ImportValue: !Sub '${EnvironmentName}-php-subnets'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-cache-subnet-group'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Cache Parameter Group
  # ========================================

  CacheParameterGroup:
    Type: AWS::ElastiCache::ParameterGroup
    Properties:
      # Family uses major version only (e.g., valkey8, not valkey8.2)
      CacheParameterGroupFamily: !Sub
        - 'valkey${MajorVersion}'
        - MajorVersion: !Select [0, !Split ['.', !Ref ValkeyVersion]]
      Description: Valkey parameter group optimized for Drupal/WordPress
      Properties:
        maxmemory-policy: allkeys-lru
        timeout: '300'
        tcp-keepalive: '300'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-cache-params'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Auth Token Secret
  # ========================================

  CacheAuthTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${SecretNamePrefix}/cache/auth-token'
      Description: Valkey AUTH token
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: true
        IncludeSpace: false
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-cache-auth-token'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Replication Group (Valkey Cluster)
  # ========================================

  CacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub '${EnvironmentName}-cache'
      ReplicationGroupDescription: Valkey cluster for page caching
      Engine: valkey
      EngineVersion: !Ref ValkeyVersion
      CacheNodeType: !Ref CacheNodeType
      NumCacheClusters: !Ref NumCacheNodes
      AutomaticFailoverEnabled: !If [MultiAZEnabled, true, false]
      MultiAZEnabled: !If [MultiAZEnabled, true, false]
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      CacheParameterGroupName: !Ref CacheParameterGroup
      SecurityGroupIds:
        - Fn::ImportValue: !Sub '${EnvironmentName}-elasticache-sg-id'
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true
      AuthToken: !Sub '{{resolve:secretsmanager:${CacheAuthTokenSecret}:SecretString}}'
      PreferredMaintenanceWindow: 'sun:05:00-sun:06:00'
      SnapshotRetentionLimit: 0  # No backups (cache is ephemeral)
      SnapshotWindow: '03:00-05:00'
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-cache'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Store Connection Info in Secrets Manager
  # ========================================

  CacheConnectionSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${SecretNamePrefix}/cache/connection'
      Description: Valkey connection information
      SecretString: !Sub |
        {
          "engine": "valkey",
          "host": "${CacheReplicationGroup.PrimaryEndPoint.Address}",
          "port": ${CacheReplicationGroup.PrimaryEndPoint.Port},
          "auth_token_secret": "${CacheAuthTokenSecret}"
        }
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-cache-connection'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # SSM Parameters
  # ========================================

  CacheEndpointParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/cache/endpoint'
      Description: Valkey primary endpoint address
      Type: String
      Value: !GetAtt CacheReplicationGroup.PrimaryEndPoint.Address
      Tags:
        Environment: !Ref EnvironmentName

  CachePortParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/cache/port'
      Description: Valkey port
      Type: String
      Value: !Sub '${CacheReplicationGroup.PrimaryEndPoint.Port}'
      Tags:
        Environment: !Ref EnvironmentName

Outputs:
  CacheReplicationGroupId:
    Description: Valkey replication group ID
    Value: !Ref CacheReplicationGroup
    Export:
      Name: !Sub '${EnvironmentName}-cache-replication-group-id'

  CachePrimaryEndpoint:
    Description: Valkey primary endpoint address
    Value: !GetAtt CacheReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub '${EnvironmentName}-cache-primary-endpoint'

  CachePort:
    Description: Valkey port
    Value: !GetAtt CacheReplicationGroup.PrimaryEndPoint.Port
    Export:
      Name: !Sub '${EnvironmentName}-cache-port'

  CacheAuthTokenSecretArn:
    Description: ARN of secret containing Valkey AUTH token
    Value: !Ref CacheAuthTokenSecret
    Export:
      Name: !Sub '${EnvironmentName}-cache-auth-token-secret-arn'

  CacheConnectionSecretArn:
    Description: ARN of secret containing connection info
    Value: !Ref CacheConnectionSecret
    Export:
      Name: !Sub '${EnvironmentName}-cache-connection-secret-arn'


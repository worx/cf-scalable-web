#
# CloudFormation Template: Application Load Balancer (Compute Layer)
#
# Purpose: Creates the public-facing ALB, NGINX target group, HTTP/HTTPS listeners,
#          and the /environment/name SSM parameter used by all boot scripts.
#
# Architecture:
#   - Internet-facing ALB in public subnets
#   - When DomainName + EnvsSubZoneId are set:
#       - Stack creates an ACM cert for DomainName (DNS-validated via the
#         envs sub-zone). AWS auto-writes the validation CNAME and
#         auto-renews the cert forever.
#       - HTTP listener (port 80) returns a 301 redirect to HTTPS.
#       - HTTPS listener (port 443) terminates TLS and forwards to NGINX.
#   - When DomainName is empty (e.g., uninitialized staging env):
#       - HTTP listener (port 80) forwards directly to NGINX. No cert,
#         no HTTPS. Useful for initial deploys before DNS is set up.
#   - SSM Parameter /environment/name for boot script environment discovery
#
# Dependencies: cf-vpc.yaml (subnets, security groups, VPC ID)
#
# Outputs: ALB ARN, DNS name, Hosted Zone ID, NGINX Target Group ARN
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Application Load Balancer for scalable web infrastructure'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment Configuration"
        Parameters:
          - EnvironmentName
      - Label:
          default: "ALB Configuration"
        Parameters:
          - ALBIdleTimeout
          - HealthCheckPath
          - HealthCheckInterval
      - Label:
          default: "HTTPS Configuration (optional — leave DomainName empty for HTTP-only)"
        Parameters:
          - DomainName
          - EnvsSubZoneId

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (used as prefix for all resources)
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: Must contain only lowercase letters, numbers, and hyphens
    Default: production

  ALBIdleTimeout:
    Type: Number
    Description: Idle timeout for ALB connections (seconds)
    MinValue: 1
    MaxValue: 4000
    Default: 60

  HealthCheckPath:
    Type: String
    Description: Health check path for NGINX target group
    Default: /health

  HealthCheckInterval:
    Type: Number
    Description: Health check interval (seconds)
    MinValue: 5
    MaxValue: 300
    Default: 30

  DomainName:
    Type: String
    Description: >
      Public FQDN this env serves on (e.g., sandbox.envs.zoning-info.com).
      When non-empty, the stack creates an ACM cert for this name and
      enables HTTPS. When empty, the ALB serves HTTP-only — useful for
      initial bring-up before DNS is delegated. See docs/SSL-MANAGEMENT.md.
    Default: ''

  EnvsSubZoneId:
    Type: String
    Description: >
      Route 53 hosted zone ID of the sub-zone where ACM will write the
      validation CNAME for the cert (e.g., Z03149452QE09GQX23F48 for
      envs.zoning-info.com). Required when DomainName is set; ignored
      otherwise. See docs/DNS-SETUP.md for how to obtain this ID after
      the one-time parent-zone delegation.
    Default: ''

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  # ========================================
  # SSM Parameter: Environment Name
  # ========================================

  # Global parameter (not env-prefixed) for boot script environment discovery.
  # Acceptable since each environment uses a separate AWS account.
  # Created here because the ALB stack deploys first in the compute layer.
  EnvironmentNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /environment/name
      Type: String
      Value: !Ref EnvironmentName
      Description: Environment name for boot script discovery
      Tags:
        Environment: !Ref EnvironmentName

  # ========================================
  # Application Load Balancer
  # ========================================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${EnvironmentName}-alb'
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-alb-sg-id'
      Subnets: !Split
        - ','
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-public-subnets'
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: !Ref ALBIdleTimeout
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: routing.http2.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-alb'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Target Group
  # ========================================

  NginxTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-nginx-tg'
      Port: 80
      Protocol: HTTP
      VpcId: !ImportValue
        Fn::Sub: '${EnvironmentName}-vpc-id'
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: !Ref HealthCheckInterval
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '120'
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nginx-tg'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # ACM Certificate (only when DomainName is set)
  # ========================================
  #
  # AWS Certificate Manager issues a publicly-trusted cert from Amazon
  # Trust Services (rooted in every major browser's trust store). DNS
  # validation: ACM writes a CNAME under DomainName into the specified
  # hosted zone; ACM watches the zone for resolution; cert issues to
  # ISSUED status (typically 3-5 min). After that ACM auto-renews
  # silently every ~11 months for as long as the cert is referenced.
  #
  # Cert lives in this stack so destroy-all takes the cert with it.
  # No orphaned certs in ACM after a tear-down cycle.
  #
  # See docs/memory/tls-cert-strategy-by-scale.md for the cost/scale
  # rationale (why ACM-on-ALB through several thousand tenants is the
  # right choice for this architecture).

  AlbCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref EnvsSubZoneId
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-alb-cert'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ========================================
  # Listeners
  # ========================================

  # Port 80: redirect to 443 when HTTPS is available, else forward
  # directly to nginx (HTTP-only fallback for uninitialized envs).
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasDomain
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref NginxTargetGroup

  # Port 443: created only when we have a domain + cert. TLS 1.3 baseline
  # (ELBSecurityPolicy-TLS13-1-2-2021-06 = TLS 1.3 preferred, TLS 1.2
  # acceptable, no older protocols). Forwards to the nginx target group.
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasDomain
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AlbCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NginxTargetGroup

Outputs:
  ALBArn:
    Description: ARN of the Application Load Balancer
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${EnvironmentName}-alb-arn'

  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${EnvironmentName}-alb-dns-name'

  ALBHostedZoneId:
    Description: Hosted zone ID of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub '${EnvironmentName}-alb-hosted-zone-id'

  NginxTargetGroupArn:
    Description: ARN of the NGINX target group
    Value: !Ref NginxTargetGroup
    Export:
      Name: !Sub '${EnvironmentName}-nginx-target-group-arn'

  AlbCertificateArn:
    Condition: HasDomain
    Description: ARN of the ACM cert attached to the HTTPS listener
    Value: !Ref AlbCertificate
    Export:
      Name: !Sub '${EnvironmentName}-alb-certificate-arn'


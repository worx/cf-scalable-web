#
# CloudFormation Template: Migration Jumpbox (Prod Account)
#
# Purpose: One small EC2 instance in the prod account, serving as a
#          conduit for one-time Drupal migration work:
#            1. mysqldump from d8demo-cluster → pipe to S3 (cross-account
#               to the sandbox migration bucket)
#            2. rsync from React2 (prod Drupal server) → pipe to S3
#          Authenticated to AWS via SSM Session Manager — no inbound
#          SSH from the world, just the AWS-managed control channel.
#
# Why placement in subnet-85e938dc:
#   - same subnet as React2 → free SSH (React2's WebSSH SG already
#     allows ALL traffic from 172.31.16.0/20)
#   - inside vpc-7fbd291a → free MySQL access to d8demo-cluster
#     (cluster SG allows 3306 from 172.31.0.0/16)
#   - public subnet with IGW → SSM Agent can phone home without NAT
#
# Lifecycle: temporary. Destroy when migration testing is done.
#
# Deploy:  make deploy-migration-jumpbox   (ZoningInfoAdmin profile)
# SSH in:  make ssm-migration-jumpbox     (opens SSM session)
# Destroy: make destroy-migration-jumpbox (ZoningInfoAdmin profile)
#
# Prerequisite: deploy the sandbox migration bucket FIRST and pass its
# ARN as MigrationBucketArn. The jumpbox role grants are scoped to that
# specific bucket; without the bucket existing, the role still creates,
# but PutObject would fail at runtime.
#

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Migration jumpbox — SSM-only EC2 in prod for one-time data ferry'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name (for emergency direct SSH if SSM ever fails)
    Default: WorxZoning

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch the jumpbox in (must be in default VPC)
    Default: subnet-85e938dc

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC the jumpbox lives in (must contain the subnet above)
    Default: vpc-7fbd291a

  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t4g.micro
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small
      - t4g.medium

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Latest Ubuntu 24.04 ARM64 AMI (via SSM Parameter Store)
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

  MigrationBucketArn:
    Type: String
    Description: ARN of the sandbox migration bucket the jumpbox writes to
    AllowedPattern: '^arn:aws:s3:::[a-z0-9.-]+$'
    Default: 'arn:aws:s3:::sandbox-migration-kv-worxco'

Resources:
  # ========================================
  # IAM role + instance profile
  # ========================================
  JumpboxRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cf-migration-jumpbox-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CrossAccountMigrationBucketWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteAndReadMigrationBucket
                Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:DeleteObject'
                Resource:
                  - !Ref MigrationBucketArn
                  - !Sub '${MigrationBucketArn}/*'
      Tags:
        - Key: Name
          Value: cf-migration-jumpbox-role
        - Key: Purpose
          Value: Cross-account migration ferry - temporary

  JumpboxInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: cf-migration-jumpbox-instance-profile
      Roles:
        - !Ref JumpboxRole

  # ========================================
  # Security group (zero inbound rules)
  # ========================================
  JumpboxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: cf-migration-jumpbox-sg
      GroupDescription: Jumpbox - outbound only (SSM, S3, RDS, SSH to React2)
      VpcId: !Ref VpcId
      # No SecurityGroupIngress — zero listening surface from the outside.
      # SSM Session Manager works via outbound TLS, no inbound needed.
      Tags:
        - Key: Name
          Value: cf-migration-jumpbox-sg

  # ========================================
  # The jumpbox instance itself
  # ========================================
  Jumpbox:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref JumpboxInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref JumpboxSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get upgrade -y
          apt-get install -y \
            mysql-client-core-8.0 \
            pigz \
            rsync \
            unzip \
            jq
          # AWS CLI v2 (Ubuntu's awscli package is v1; we want v2)
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install
          rm -rf /tmp/awscliv2.zip /tmp/aws
          # Marker for "user-data finished" — operator scripts can wait for this
          touch /etc/migration-jumpbox-ready
      Tags:
        - Key: Name
          Value: cf-migration-jumpbox
        - Key: Purpose
          Value: Cross-account Drupal migration ferry - TEMPORARY

Outputs:
  JumpboxInstanceId:
    Description: Instance ID — use this for `aws ssm start-session --target ...`
    Value: !Ref Jumpbox

  JumpboxPrivateIp:
    Description: Private IP inside vpc-7fbd291a
    Value: !GetAtt Jumpbox.PrivateIp

  JumpboxRoleArn:
    Description: IAM role ARN (must match sandbox bucket policy's allowed pattern)
    Value: !GetAtt JumpboxRole.Arn

  SSMStartCommand:
    Description: Command to start an SSM session to this jumpbox
    Value: !Sub 'aws --profile ZoningInfoAdmin ssm start-session --target ${Jumpbox}'

